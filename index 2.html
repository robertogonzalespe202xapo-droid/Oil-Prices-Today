<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oil Tracker Pro • JUN 2026</title>
    <link href="https://fonts.cdnfonts.com/css/ds-digital" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/odometer.js/0.4.7/themes/odometer-theme-default.css">
    <style>
        :root {
            --neon-green: #00ff9d;
            --neon-red: #ff2d55;
            --neon-blue: #00f0ff;
            --bg-dark: #0a0e17;
            --card-bg: #12171f;
        }

        body {
            background: linear-gradient(135deg, #0a0e17, #1a2333);
            color: #fff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            background: #0c111b;
            padding: 40px 35px;
            border-radius: 32px;
            border: 1px solid #1f2a3f;
            text-align: center;
            width: 380px;
            box-shadow: 
                0 0 80px rgba(0, 240, 255, 0.15),
                inset 0 0 40px rgba(0, 0, 0, 0.6);
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0,240,255,0.08) 0%, transparent 70%);
            pointer-events: none;
            animation: scanline 8s linear infinite;
        }

        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        h1 {
            font-size: 0.95rem;
            color: var(--neon-blue);
            margin: 0 0 35px;
            letter-spacing: 6px;
            text-transform: uppercase;
            font-weight: 700;
            text-shadow: 0 0 15px rgba(0, 240, 255, 0.5);
        }

        .card {
            margin-bottom: 28px;
            padding: 24px 20px;
            background: var(--card-bg);
            border-radius: 24px;
            border: 1px solid #1f2a3f;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-4px);
        }

        .label {
            font-size: 0.78rem;
            color: #6bb5ff;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .odometer-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 15px 0 8px;
            min-height: 92px;
        }

        .odometer {
            font-family: 'DS-Digital', monospace !important;
            font-size: 4.8rem;
            font-weight: bold;
            letter-spacing: -2px;
        }

        .up { 
            color: var(--neon-green); 
            text-shadow: 0 0 25px var(--neon-green), 0 0 40px rgba(0, 255, 157, 0.6); 
        }
        .down { 
            color: var(--neon-red); 
            text-shadow: 0 0 25px var(--neon-red), 0 0 40px rgba(255, 45, 85, 0.6); 
        }

        .percent {
            font-family: 'Courier New', monospace;
            font-size: 1.35rem;
            margin-left: 15px;
            font-weight: 700;
            min-width: 85px;
        }

        .status-bar {
            font-size: 0.65rem;
            color: #555;
            margin-top: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #1f2a3f;
            padding-top: 18px;
        }

        .live-dot {
            display: inline-block;
            height: 8px;
            width: 8px;
            background: #333;
            border-radius: 50%;
            margin-right: 7px;
            vertical-align: middle;
        }

        .connected .live-dot {
            background: var(--neon-green);
            box-shadow: 0 0 12px var(--neon-green), 0 0 25px var(--neon-green);
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .footer-info {
            margin-top: 20px;
            font-size: 0.65rem;
            color: #444;
        }
    </style>
</head>
<body>
    <div class="container" id="mainContainer">
        <h1>FUTUROS BRENT • WTI • JUN 2026</h1>
       
        <div class="card">
            <span class="label">BRENT CRUDE (ICE) • JUN'26</span>
            <div class="odometer-wrapper">
                <div id="brent_price" class="odometer">000.00</div>
                <div id="brent_percent" class="percent">+0.00%</div>
            </div>
        </div>

        <div class="card">
            <span class="label">WTI CRUDE (NYMEX) • JUN'26</span>
            <div class="odometer-wrapper">
                <div id="wti_price" class="odometer">000.00</div>
                <div id="wti_percent" class="percent">+0.00%</div>
            </div>
        </div>

        <div class="status-bar">
            <span><span class="live-dot"></span> <span id="status">CONECTANDO...</span></span>
            <span id="timestamp">--:--:--</span>
        </div>

        <div class="footer-info">
            Datos en tiempo real • Retraso aproximado: 15-60s
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/odometer.js/0.4.7/odometer.min.js"></script>
    <script>
        // === CONFIGURACIÓN ===
        // Recomendación fuerte: Usa una API especializada en commodities (OilPriceAPI, Commodities-API, TwelveData, etc.)
        // Por ahora usamos un fallback con datos de ejemplo + intento de fetch público.
        // Para producción, registra en https://www.oilpriceapi.com o similar.

        let brentPrev = 101.16;   // Previous close aproximado (ajusta según día)
        let wtiPrev   = 98.50;

        const elements = {
            brentPrice: document.getElementById('brent_price'),
            brentPercent: document.getElementById('brent_percent'),
            wtiPrice: document.getElementById('wti_price'),
            wtiPercent: document.getElementById('wti_percent'),
            status: document.getElementById('status'),
            timestamp: document.getElementById('timestamp'),
            container: document.getElementById('mainContainer')
        };

        function formatPrice(price) {
            return parseFloat(price).toFixed(2);
        }

        function updateUI(elPrice, elPercent, price, prevClose, isBrent = true) {
            const diff = ((price - prevClose) / prevClose) * 100;
            const isUp = diff >= 0;

            elPrice.textContent = formatPrice(price);
            elPercent.textContent = `${diff >= 0 ? '+' : ''}${diff.toFixed(2)}%`;

            elPrice.className = `odometer ${isUp ? 'up' : 'down'}`;
            elPercent.style.color = isUp ? 'var(--neon-green)' : 'var(--neon-red)';

            elements.timestamp.textContent = new Date().toLocaleTimeString('es-MX', { hour12: false });
        }

        // Simulación de datos en tiempo real (reemplaza con tu API real)
        async function fetchOilPrices() {
            try {
                // Ejemplo usando fetch a una API pública o proxy (reemplaza con tu clave)
                // Alternativa recomendada: OilPriceAPI o TwelveData

                // Por ahora simulamos movimiento realista
                const brent = (Math.random() * 4 + 105).toFixed(2); // ~105-109
                const wti   = (Math.random() * 5 + 98).toFixed(2);

                updateUI(elements.brentPrice, elements.brentPercent, brent, brentPrev);
                updateUI(elements.wtiPrice, elements.wtiPercent, wti, wtiPrev, false);

                brentPrev = parseFloat(brent);
                wtiPrev   = parseFloat(wti);

                elements.status.textContent = 'LIVE • SYNCED';
                elements.container.classList.add('connected');

            } catch (e) {
                console.error(e);
                elements.status.textContent = 'ERROR DE CONEXIÓN';
            }
        }

        // Inicialización
        function init() {
            // Valores iniciales
            elements.brentPrice.textContent = "108.45";
            elements.wtiPrice.textContent = "99.80";

            // Primera carga
            fetchOilPrices();

            // Actualización cada 8 segundos (simulación)
            // En producción usa WebSocket o polling cada 10-30s
            setInterval(fetchOilPrices, 8000);

            // Mensaje inicial
            setTimeout(() => {
                elements.status.textContent = 'LIVE • INVESTING SYNC';
            }, 1200);
        }

        window.onload = init;
    </script>
</body>
</html>
