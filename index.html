<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oil Tracker Pro • LIVE</title>
    
    <style>
        :root {
            --neon-blue: #00f0ff;
            --neon-green: #00ff9d;
            --neon-red: #ff2d55;
            --rgb-speed: 3s;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #050a14;
            color: #fff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 30% 20%, rgba(0, 240, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 70% 80%, rgba(0, 255, 157, 0.1) 0%, transparent 50%),
                linear-gradient(180deg, #050a14 0%, #0a1428 100%);
            z-index: -1;
            animation: waterReflect 8s ease-in-out infinite alternate;
        }

        @keyframes waterReflect {
            0% { opacity: 0.8; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.1); filter: brightness(1.2); }
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            z-index: 10;
        }

        .card-wrapper {
            position: relative;
            padding: 3px;
            border-radius: 28px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .card-wrapper::before {
            content: "";
            position: absolute;
            top: -25%; left: -25%; width: 150%; height: 150%;
            background: conic-gradient(from 0deg, transparent 0%, var(--neon-blue) 25%, var(--neon-green) 50%, var(--neon-blue) 75%, transparent 100%);
            animation: rotateRGB var(--rgb-speed) linear infinite;
        }

        @keyframes rotateRGB {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .card {
            background: rgba(12, 17, 27, 0.95);
            border-radius: 25px;
            padding: 25px;
            position: relative;
            z-index: 2;
            backdrop-filter: blur(15px);
            text-align: center;
        }

        .label {
            font-size: 0.75rem;
            color: #7eb8ff;
            letter-spacing: 2px;
            font-weight: 800;
            margin-bottom: 10px;
            display: block;
        }

        .price-main {
            font-family: 'Courier New', monospace;
            font-size: 4.2rem;
            font-weight: 900;
            line-height: 1;
            transition: 0.3s;
        }

        /* Animación cuando el precio cambia */
        .price-update {
            animation: flashUpdate 0.5s ease-out;
        }

        @keyframes flashUpdate {
            0% { filter: brightness(3); transform: scale(1.05); }
            100% { filter: brightness(1); transform: scale(1); }
        }

        .status-tag {
            font-size: 0.6rem;
            padding: 3px 8px;
            border-radius: 5px;
            background: rgba(0, 255, 157, 0.1);
            color: var(--neon-green);
            margin-top: 10px;
            display: inline-block;
        }

        .btn {
            background: rgba(0, 240, 255, 0.05);
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 8px 15px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .console-box {
            background: #000;
            font-family: 'Courier New', monospace;
            padding: 15px;
            height: 150px;
            overflow-y: auto;
            font-size: 0.7rem;
            color: var(--neon-green);
            border-radius: 15px;
            margin-top: 20px;
            border: 1px solid #1f2a3f;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <header style="text-align: center; margin-bottom: 20px;">
            <h1 style="font-size: 1rem; letter-spacing: 4px; color: var(--neon-blue);">LIVE FEED :: 2026</h1>
            <div id="socket-status" style="font-size: 0.6rem; color: #456;">CONECTANDO AL CABLE...</div>
        </header>

        <div class="card-wrapper">
            <div class="card">
                <span class="label">BRENT CRUDE</span>
                <div id="brent-val" class="price-main">00.00</div>
                <div class="status-tag">REAL-TIME DATA</div>
            </div>
        </div>

        <div class="card-wrapper">
            <div class="card">
                <span class="label">WTI CRUDE</span>
                <div id="wti-val" class="price-main">00.00</div>
                <div class="status-tag">REAL-TIME DATA</div>
            </div>
        </div>

        <div style="text-align: center;">
            <button class="btn" onclick="toggleConsole()">Monitor del Sistema</button>
        </div>

        <div id="console" class="console-box"></div>
    </div>

    <script>
        const TOKEN = "d0fe91b38b11caf283f0fe96e05992e7f3807eae0455325cd76e1f988477b685";
        const WS_URL = `wss://api.oilpriceapi.com/cable?token=${TOKEN}`;
        
        let ws;

        function log(msg) {
            const c = document.getElementById('console');
            const now = new Date().toLocaleTimeString();
            c.innerHTML += `<div>[${now}] ${msg}</div>`;
            c.scrollTop = c.scrollHeight;
        }

        function initWebSocket() {
            ws = new WebSocket(WS_URL);

            ws.onopen = () => {
                log('Conexión establecida con el servidor.');
                document.getElementById('socket-status').innerText = "CONECTADO - TRANSMITIENDO";
                document.getElementById('socket-status').style.color = "#00ff9d";
                
                // Suscribirse al canal
                ws.send(JSON.stringify({
                    command: 'subscribe',
                    identifier: JSON.stringify({ channel: 'EnergyPricesChannel' })
                }));
            };

            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);

                if (msg.type === 'ping') return;
                
                if (msg.type === 'confirm_subscription') {
                    log('Suscripción confirmada: EnergyPricesChannel');
                    return;
                }

                if (msg.message && msg.message.prices) {
                    const data = msg.message.prices;
                    log('Nuevos precios recibidos.');
                    
                    if(data.oil) {
                        updateUI('brent-val', data.oil.brent?.original_price);
                        updateUI('wti-val', data.oil.wti?.original_price);
                    }
                }
            };

            ws.onerror = (err) => {
                log('Error de conexión WebSocket.');
                document.getElementById('socket-status').innerText = "ERROR DE CONEXIÓN";
                document.getElementById('socket-status').style.color = "#ff2d55";
            };

            ws.onclose = () => {
                log('Conexión cerrada. Reintentando en 5s...');
                setTimeout(initWebSocket, 5000);
            };
        }

        function updateUI(id, value) {
            if (!value) return;
            const el = document.getElementById(id);
            const formattedValue = value.toFixed(2);
            
            if (el.innerText !== formattedValue) {
                el.innerText = formattedValue;
                el.classList.remove('price-update');
                void el.offsetWidth; // Truco para reiniciar animación
                el.classList.add('price-update');
            }
        }

        function toggleConsole() {
            const c = document.getElementById('console');
            c.style.display = c.style.display === 'block' ? 'none' : 'block';
        }

        // Iniciar sistema
        initWebSocket();
    </script>
</body>
</html>
