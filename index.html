<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oil Tracker Pro | LCD Fixed</title>
    <link href="https://fonts.cdnfonts.com/css/ds-digital" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/odometer.js/0.4.7/themes/odometer-theme-default.css">
    
    <style>
        :root { --neon-green: #39FF14; --neon-red: #ff3131; --bg-dark: #000c18; }
        body { background: var(--bg-dark); color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #000; padding: 30px; border-radius: 28px; border: 1px solid #002a4d; text-align: center; width: 350px; box-shadow: 0 10px 80px rgba(0,42,77,0.5); }
        h1 { font-size: 0.7rem; color: #444; margin: 0 0 25px; letter-spacing: 4px; text-transform: uppercase; }
        .card { margin-bottom: 20px; padding: 15px; background: #050505; border-radius: 16px; border: 1px solid #111; }
        .label { font-size: 0.75rem; color: #5bc0de; font-weight: bold; letter-spacing: 1px; }
        
        /* Contenedor del Odómetro */
        .odometer-wrapper { display: flex; align-items: center; justify-content: center; margin-top: 10px; min-height: 80px; }
        .odometer { 
            font-family: 'DS-Digital', monospace !important; 
            font-size: 3.8rem; 
            transition: color 0.3s ease;
        }
        
        .up { color: var(--neon-green); text-shadow: 0 0 15px rgba(0, 255, 20, 0.4); }
        .down { color: var(--neon-red); text-shadow: 0 0 15px rgba(255, 49, 49, 0.4); }
        .percent { font-family: 'Courier New', monospace; font-size: 1rem; margin-left: 10px; color: #666; font-weight: bold; }

        .status-bar { font-size: 0.6rem; color: #333; margin-top: 20px; display: flex; justify-content: space-between; }
        .live-dot { height: 7px; width: 7px; background: #222; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .connected .live-dot { background: var(--neon-green); box-shadow: 0 0 8px var(--neon-green); animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <div class="container" id="mainContainer">
        <h1>FUTUROS PETRÓLEO JUN-26</h1>
        
        <div class="card">
            <span class="label">BRENT CRUDE OIL</span>
            <div class="odometer-wrapper">
                <div id="brent_price" class="odometer">00.00</div>
                <div id="brent_percent" class="percent">(--%)</div>
            </div>
        </div>

        <div class="card">
            <span class="label">WTI CRUDE OIL</span>
            <div class="odometer-wrapper">
                <div id="wti_price" class="odometer">00.00</div>
                <div id="wti_percent" class="percent">(--%)</div>
            </div>
        </div>

        <div class="status-bar">
            <span><span class="live-dot"></span> <span id="status">CONNECTING...</span></span>
            <span id="timestamp">--:--:--</span>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/odometer.js/0.4.7/odometer.min.js"></script>

    <script>
        const apiKey = 'd775n0hr01qtg3nfne1gd775n0hr01qtg3nfne20';
        const symbols = {
            'OANDA:BCO_USD': { priceId: 'brent_price', percentId: 'brent_percent' },
            'OANDA:WTICO_USD': { priceId: 'wti_price', percentId: 'wti_percent' }
        };

        let lastPrices = {};
        let yesterdayCloses = {};

        // Configuración manual del odómetro para evitar fallos de renderizado
        window.odometerOptions = { auto: false, duration: 1000, format: '(,ddd).dd' };

        async function loadInitialData() {
            for (const [symbol, config] of Object.entries(symbols)) {
                try {
                    const response = await fetch(`https://finnhub.io/api/v1/quote?symbol=${symbol}&token=${apiKey}`);
                    const data = await response.json();
                    if (data.pc) yesterdayCloses[config.priceId] = data.pc;
                    if (data.c) updateUI(config.priceId, data.c);
                } catch (e) { console.error("Error inicial:", e); }
            }
        }

        const socket = new WebSocket(`wss://ws.finnhub.io?token=${apiKey}`);

        socket.addEventListener('open', () => {
            document.getElementById('mainContainer').classList.add('connected');
            document.getElementById('status').innerText = 'LIVE STREAM';
            Object.keys(symbols).forEach(s => socket.send(JSON.stringify({'type':'subscribe', 'symbol': s})));
            loadInitialData();
        });

        socket.addEventListener('message', (event) => {
            const data = JSON.parse(event.data);
            if (data.type === 'trade') {
                data.data.forEach(trade => {
                    const config = symbols[trade.s];
                    if (config) updateUI(config.priceId, trade.p);
                });
            }
        });

        function updateUI(id, price) {
            const priceEl = document.getElementById(id);
            const percentEl = document.getElementById(id.replace('price', 'percent'));
            const yesterdayClose = yesterdayCloses[id] || price;

            // Actualizar precio con odómetro
            priceEl.innerHTML = price.toFixed(2);
            
            // Color según cierre de ayer
            if (price > yesterdayClose) priceEl.className = 'odometer up';
            else if (price < yesterdayClose) priceEl.className = 'odometer down';

            // Porcentaje
            const diff = ((price - yesterdayClose) / yesterdayClose) * 100;
            percentEl.innerText = `(${diff > 0 ? '+' : ''}${diff.toFixed(2)}%)`;
            percentEl.style.color = diff > 0 ? 'var(--neon-green)' : 'var(--neon-red)';

            document.getElementById('timestamp').innerText = new Date().toLocaleTimeString();
            lastPrices[id] = price;
        }

        socket.onclose = () => {
            document.getElementById('status').innerText = 'OFFLINE';
            setTimeout(() => location.reload(), 5000);
        };
    </script>
</body>
</html>
