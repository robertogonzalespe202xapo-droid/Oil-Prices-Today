<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oil Tracker Pro • 2026</title>
    
    <style>
        :root {
            --neon-green: #00ff9d;
            --neon-red: #ff2d55;
            --neon-blue: #00f0ff;
            --card-bg: #12171f;
            --accent: #1f2a3f;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: radial-gradient(circle at center, #1a2333 0%, #0a0e17 100%);
            color: #fff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            overflow-x: hidden;
        }

        .container {
            background: #0c111b;
            padding: 30px 25px;
            border-radius: 32px;
            border: 1px solid #1f2a3f;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6),
                        0 0 40px rgba(0, 240, 255, 0.15);
            position: relative;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: var(--neon-blue);
            text-shadow: 0 0 15px var(--neon-blue);
        }

        .header .version {
            font-size: 0.65rem;
            background: rgba(0, 240, 255, 0.1);
            color: var(--neon-blue);
            padding: 4px 12px;
            border-radius: 50px;
            border: 1px solid var(--neon-blue);
        }

        .card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 28px 20px;
            margin-bottom: 24px;
            border: 1px solid var(--accent);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 30px rgba(0, 240, 255, 0.25);
            border-color: var(--neon-blue);
        }

        .label {
            font-size: 0.78rem;
            color: #7eb8ff;
            font-weight: 800;
            letter-spacing: 3px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .price-main {
            font-family: 'Courier New', monospace;
            font-size: 4.8rem;
            font-weight: 700;
            line-height: 1;
            margin: 8px 0 12px;
            text-shadow: 0 0 20px rgba(255,255,255,0.15);
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .change {
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .positive { color: var(--neon-green); }
        .negative { color: var(--neon-red); }

        .stat-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 18px;
        }

        .stat-box {
            font-family: 'Courier New', monospace;
            font-size: 0.75rem;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 700;
            flex: 1;
            text-align: center;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .max-box {
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            background: rgba(0, 255, 157, 0.08);
        }

        .min-box {
            border: 1px solid var(--neon-red);
            color: var(--neon-red);
            background: rgba(255, 45, 85, 0.08);
        }

        .sparkline-container {
            height: 68px;
            margin-top: 8px;
            position: relative;
        }

        .sparkline {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 6px currentColor);
        }

        .status-bar {
            margin-top: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.7rem;
            color: #456;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .live-dot {
            display: inline-block;
            width: 8px; height: 8px;
            background: var(--neon-green);
            border-radius: 50%;
            margin-right: 6px;
            box-shadow: 0 0 12px var(--neon-green);
            animation: pulse 1.8s infinite;
        }

        @keyframes pulse { 
            0%, 100% { opacity: 1; } 
            50% { opacity: 0.3; } 
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(10, 14, 23, 0.95);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
        }

        .modal-content {
            background: #0c111b;
            border-radius: 24px;
            width: 92%;
            max-width: 400px;
            padding: 30px;
            border: 1px solid #1f2a3f;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            animation: modalPop 0.3s ease;
        }

        @keyframes modalPop {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .loading {
            animation: loadingPulse 1.5s infinite;
            opacity: 0.6;
        }

        @keyframes loadingPulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        .refresh-btn {
            background: transparent;
            border: 2px solid var(--neon-blue);
            color: var(--neon-blue);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .refresh-btn:hover {
            background: var(--neon-blue);
            color: #0c111b;
            transform: rotate(180deg);
        }

        .error-msg {
            color: var(--neon-red);
            font-size: 0.75rem;
            text-align: center;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="container" id="mainContainer">
        <div class="header">
            <h1>Oil Tracker Pro • 2026</h1>
            <div class="version">LIVE • commoditypriceapi.com</div>
        </div>
        
        <!-- BRENT CARD -->
        <div class="card" id="brent-card">
            <span class="label">BRENT CRUDE <span style="font-size:0.6rem; opacity:0.6;">(USD/bbl)</span></span>
            
            <div id="brent_price" class="price-main">00.00</div>
            
            <div id="brent_change" class="change">—</div>
            
            <div class="stat-row">
                <div class="stat-box max-box">MAX MES: <span id="brent_max">111.80</span></div>
                <div class="stat-box min-box">MIN MES: <span id="brent_min">91.70</span></div>
            </div>

            <div class="sparkline-container">
                <canvas id="brent_spark" class="sparkline" width="380" height="68"></canvas>
            </div>
        </div>

        <!-- WTI CARD -->
        <div class="card" id="wti-card">
            <span class="label">WTI CRUDE <span style="font-size:0.6rem; opacity:0.6;">(USD/bbl)</span></span>
            
            <div id="wti_price" class="price-main">00.00</div>
            
            <div id="wti_change" class="change">—</div>
            
            <div class="stat-row">
                <div class="stat-box max-box">MAX MES: <span id="wti_max">117.57</span></div>
                <div class="stat-box min-box">MIN MES: <span id="wti_min">96.50</span></div>
            </div>

            <div class="sparkline-container">
                <canvas id="wti_spark" class="sparkline" width="380" height="68"></canvas>
            </div>
        </div>

        <div class="status-bar">
            <span><span class="live-dot"></span>LIVE FEED • commoditypriceapi.com</span>
            <span id="timestamp">--:--:--</span>
            <button id="refresh-btn" class="refresh-btn" title="Actualizar ahora">↻</button>
        </div>

        <div id="error-container" class="error-msg" style="display:none;"></div>
    </div>

    <!-- MODAL -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="modal-title">Detalles</div>
                <span class="close" id="modal-close">×</span>
            </div>
            <div id="modal-body">
                <!-- Se llena dinámicamente -->
            </div>
        </div>
    </div>

    <script>
        // ==================== NUEVA API (mejor límite) ====================
        const API_KEY = "81910c5e-8464-4658-9379-ff3c7199fc75";
        const BASE_URL = "https://api.commoditypriceapi.com/v2";

        // Datos manuales del mes (abril 2026)
        const MONTH_STATS = {
            brent: { max: 111.80, min: 91.70 },
            wti:   { max: 117.57, min: 96.50 }
        };

        // Historial para sparklines
        let brentHistory = [];
        let wtiHistory = [];
        let lastBrent = null;
        let lastWTI = null;

        // ==================== FETCH OPTIMIZADO (una sola llamada) ====================
        async function fetchLatestPrices() {
            try {
                const url = `\( {BASE_URL}/latest?apiKey= \){API_KEY}&symbols=BRENTOIL-FUT,WTIOIL-FUT`;
                
                const res = await fetch(url, { cache: 'no-store' });
                const json = await res.json();

                if (!json.success || !json.rates) {
                    throw new Error(json.error || 'Respuesta inválida de la API');
                }

                return {
                    brent: parseFloat(json.rates['BRENTOIL-FUT']) || 0,
                    wti:   parseFloat(json.rates['WTIOIL-FUT'])   || 0
                };
            } catch (e) {
                console.warn("Error API commoditypriceapi:", e);
                throw e;
            }
        }

        // ==================== FUNCIONES AUXILIARES (mismas que antes) ====================
        function showLoading() {
            document.getElementById('brent_price').classList.add('loading');
            document.getElementById('wti_price').classList.add('loading');
        }

        function hideLoading() {
            document.getElementById('brent_price').classList.remove('loading');
            document.getElementById('wti_price').classList.remove('loading');
        }

        function updateChangeDisplay(id, current, previous) {
            const changeEl = document.getElementById(id);
            if (!previous || previous === 0) {
                changeEl.innerHTML = `<span style="opacity:0.5">—</span>`;
                return;
            }
            const diff = current - previous;
            const pct = (diff / previous * 100).toFixed(2);
            const isPositive = diff >= 0;

            changeEl.innerHTML = `
                ${isPositive ? '▲' : '▼'} 
                ${diff.toFixed(2)} 
                <span style="font-size:0.85rem">(${pct}%)</span>
            `;
            changeEl.className = `change ${isPositive ? 'positive' : 'negative'}`;
        }

        function drawSparkline(canvasId, history, lineColor) {
            const canvas = document.getElementById(canvasId);
            if (!canvas || history.length < 2) return;
            
            const ctx = canvas.getContext('2d');
            const w = canvas.width;
            const h = canvas.height;
            
            ctx.clearRect(0, 0, w, h);
            
            const max = Math.max(...history);
            const min = Math.min(...history);
            const range = max - min || 1;

            ctx.strokeStyle = lineColor;
            ctx.lineWidth = 3.5;
            ctx.shadowBlur = 12;
            ctx.shadowColor = lineColor;
            
            ctx.beginPath();
            
            history.forEach((price, i) => {
                const x = (i / (history.length - 1)) * w;
                const y = h - ((price - min) / range * (h - 10)) - 5;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });
            
            ctx.stroke();
            
            ctx.fillStyle = lineColor;
            const lastX = w - 6;
            const lastY = h - ((history[history.length-1] - min) / range * (h - 10)) - 5;
            ctx.fillRect(lastX, lastY - 2, 4, 4);
        }

        function showError(msg) {
            const container = document.getElementById('error-container');
            container.textContent = msg;
            container.style.display = 'block';
            setTimeout(() => { container.style.display = 'none'; }, 8000);
        }

        function showModal(type) {
            const modal = document.getElementById('modal');
            const title = document.getElementById('modal-title');
            const body = document.getElementById('modal-body');
            
            const priceEl = type === 'brent' ? document.getElementById('brent_price') : document.getElementById('wti_price');
            const currentPrice = parseFloat(priceEl.textContent) || 0;
            const stats = type === 'brent' ? MONTH_STATS.brent : MONTH_STATS.wti;
            
            title.textContent = type === 'brent' ? 'BRENT CRUDE • Detalles' : 'WTI CRUDE • Detalles';
            
            body.innerHTML = `
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:24px;">
                    <div style="text-align:center; background:rgba(255,255,255,0.05); border-radius:16px; padding:16px;">
                        <div style="font-size:0.75rem; color:#7eb8ff;">PRECIO ACTUAL</div>
                        <div style="font-size:2.8rem; font-weight:700; margin:8px 0;">${currentPrice.toFixed(2)}</div>
                        <div style="color:var(--neon-green); font-size:0.9rem;">USD/bbl</div>
                    </div>
                    <div style="text-align:center; background:rgba(255,255,255,0.05); border-radius:16px; padding:16px;">
                        <div style="font-size:0.75rem; color:#7eb8ff;">CAMBIO 24H</div>
                        <div id="modal-change" style="font-size:2rem; font-weight:700; margin:8px 0;">—</div>
                    </div>
                </div>
                
                <div style="background:rgba(255,255,255,0.05); border-radius:16px; padding:18px; margin-bottom:24px;">
                    <div style="display:flex; justify-content:space-between; margin-bottom:12px;">
                        <span style="color:#7eb8ff;">MÁXIMO MES</span>
                        <span style="color:var(--neon-green); font-weight:700;">${stats.max.toFixed(2)}</span>
                    </div>
                    <div style="display:flex; justify-content:space-between;">
                        <span style="color:#7eb8ff;">MÍNIMO MES</span>
                        <span style="color:var(--neon-red); font-weight:700;">${stats.min.toFixed(2)}</span>
                    </div>
                </div>
                
                <div style="font-size:0.85rem; line-height:1.5; opacity:0.8;">
                    Datos en tiempo real vía <strong>commoditypriceapi.com</strong>.<br>
                    Última actualización: <span id="modal-timestamp">${new Date().toLocaleTimeString('es-MX')}</span><br><br>
                    <strong>Plan Lite:</strong> 2.000 llamadas/mes • Actualización cada 10 min.
                </div>
                
                <button onclick="document.getElementById('modal').style.display='none'" 
                        style="margin-top:28px; width:100%; padding:14px; background:var(--neon-blue); color:#0c111b; border:none; border-radius:12px; font-weight:700; cursor:pointer;">
                    CERRAR
                </button>
            `;
            
            modal.style.display = 'flex';
        }

        // ==================== ACTUALIZACIÓN PRINCIPAL ====================
        async function updateAll() {
            showLoading();
            const errorContainer = document.getElementById('error-container');
            errorContainer.style.display = 'none';
            
            try {
                const prices = await fetchLatestPrices();
                const now = new Date();
                
                // BRENT
                if (prices.brent > 0) {
                    document.getElementById('brent_price').textContent = prices.brent.toFixed(2);
                    updateChangeDisplay('brent_change', prices.brent, lastBrent);
                    
                    brentHistory.push(prices.brent);
                    if (brentHistory.length > 30) brentHistory.shift();
                    drawSparkline('brent_spark', brentHistory, 'var(--neon-green)');
                    
                    lastBrent = prices.brent;
                }
                
                // WTI
                if (prices.wti > 0) {
                    document.getElementById('wti_price').textContent = prices.wti.toFixed(2);
                    updateChangeDisplay('wti_change', prices.wti, lastWTI);
                    
                    wtiHistory.push(prices.wti);
                    if (wtiHistory.length > 30) wtiHistory.shift();
                    drawSparkline('wti_spark', wtiHistory, 'var(--neon-blue)');
                    
                    lastWTI = prices.wti;
                }
                
                // Timestamp
                document.getElementById('timestamp').textContent = now.toLocaleTimeString('es-MX', { 
                    hour: '2-digit', minute: '2-digit', second: '2-digit' 
                });
                
            } catch (err) {
                console.error(err);
                showError("⚠️ Error al conectar con la API (posible rate limit o clave inválida)");
            } finally {
                hideLoading();
            }
        }

        // ==================== INICIALIZACIÓN ====================
        function init() {
            // Stats del mes
            document.getElementById('brent_max').textContent = MONTH_STATS.brent.max.toFixed(2);
            document.getElementById('brent_min').textContent = MONTH_STATS.brent.min.toFixed(2);
            document.getElementById('wti_max').textContent = MONTH_STATS.wti.max.toFixed(2);
            document.getElementById('wti_min').textContent = MONTH_STATS.wti.min.toFixed(2);

            // Primera carga
            updateAll();

            // Actualización cada 30 segundos (el plan Lite actualiza cada \~10 min, pero no consume más quota)
            setInterval(updateAll, 30000);

            // Botón manual
            document.getElementById('refresh-btn').addEventListener('click', () => {
                updateAll();
                const btn = document.getElementById('refresh-btn');
                btn.style.transform = 'rotate(360deg)';
                setTimeout(() => btn.style.transform = '', 600);
            });

            // Clicks en cards
            document.getElementById('brent-card').addEventListener('click', () => showModal('brent'));
            document.getElementById('wti-card').addEventListener('click', () => showModal('wti'));

            // Cerrar modal
            document.getElementById('modal-close').addEventListener('click', () => {
                document.getElementById('modal').style.display = 'none';
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    const modal = document.getElementById('modal');
                    if (modal.style.display === 'flex') modal.style.display = 'none';
                }
            });

            console.log('%c✅ Oil Tracker Pro 2026 → Ahora con commoditypriceapi.com (2.000 llamadas/mes)', 'color:#00ff9d; font-weight:700;');
        }

        function parallelSparkWorker() {
            setInterval(() => {
                if (brentHistory.length >= 2) drawSparkline('brent_spark', brentHistory, 'var(--neon-green)');
                if (wtiHistory.length >= 2) drawSparkline('wti_spark', wtiHistory, 'var(--neon-blue)');
            }, 8000);
        }

        window.onload = () => {
            init();
            parallelSparkWorker();
        };
    </script>
</body>
</html>
