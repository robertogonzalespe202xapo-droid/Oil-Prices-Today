<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oil Tracker Pro • JUN 2026</title>
    
    <style>
        :root {
            --neon-green: #00ff9d;
            --neon-red: #ff2d55;
            --neon-blue: #00f0ff;
            --bg: #0a0e17;
            --card-bg: #12171f;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: linear-gradient(135deg, #0a0e17 0%, #1a2333 100%);
            color: #fff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .container {
            background: #0c111b;
            padding: 35px 25px;
            border-radius: 28px;
            border: 1px solid #1f2a3f;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 0 100px rgba(0, 240, 255, 0.15), inset 0 0 50px rgba(0,0,0,0.8);
        }

        .header h1 {
            text-align: center;
            font-size: clamp(1rem, 4.5vw, 1.3rem);
            color: var(--neon-blue);
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 40px;
            text-shadow: 0 0 20px rgba(0, 240, 255, 0.7);
        }

        .card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 26px 20px;
            margin-bottom: 24px;
            border: 1px solid #1f2a3f;
            box-shadow: 0 10px 35px rgba(0,0,0,0.7);
        }

        .label {
            font-size: 0.85rem;
            color: #7eb8ff;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 14px;
        }

        .price-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
        }

        .price {
            font-family: 'DS-Digital', monospace;
            font-size: clamp(3.6rem, 11vw, 5.6rem);
            font-weight: bold;
            line-height: 1;
            letter-spacing: -4px;
        }

        .up { color: var(--neon-green); text-shadow: 0 0 25px var(--neon-green), 0 0 55px rgba(0,255,157,0.85); }
        .down { color: var(--neon-red); text-shadow: 0 0 25px var(--neon-red), 0 0 55px rgba(255,45,85,0.85); }

        .percent {
            font-family: 'Courier New', monospace;
            font-size: 1.65rem;
            font-weight: 700;
            min-width: 100px;
        }

        .status-bar {
            margin-top: 32px;
            padding-top: 20px;
            border-top: 1px solid #1f2a3f;
            display: flex;
            justify-content: space-between;
            font-size: 0.74rem;
            color: #777;
        }

        .live-dot {
            display: inline-block;
            width: 10px; height: 10px;
            background: #333;
            border-radius: 50%;
            margin-right: 8px;
        }

        .connected .live-dot {
            background: var(--neon-green);
            box-shadow: 0 0 18px var(--neon-green);
            animation: pulse 1.4s infinite;
        }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }

        .footer { text-align: center; margin-top: 28px; font-size: 0.68rem; color: #555; }
        .error { color: #ff6666; }
    </style>
</head>
<body>
    <div class="container" id="mainContainer">
        <div class="header">
            <h1>FUTUROS BRENT • WTI • JUN 2026</h1>
        </div>
        
        <div class="card">
            <span class="label">BRENT CRUDE • JUN'26</span>
            <div class="price-row">
                <span id="brent_price" class="price">000.00</span>
                <span id="brent_percent" class="percent">+0.00%</span>
            </div>
        </div>

        <div class="card">
            <span class="label">WTI CRUDE • JUN'26</span>
            <div class="price-row">
                <span id="wti_price" class="price">000.00</span>
                <span id="wti_percent" class="percent">+0.00%</span>
            </div>
        </div>

        <div class="status-bar">
            <span><span class="live-dot"></span><span id="status">CONECTANDO...</span></span>
            <span id="timestamp">--:--:--</span>
        </div>

        <div class="footer">Datos reales vía OilPriceAPI.com</div>
    </div>

    <script>
        const API_KEY = "7e5869c8f17e379b2fb01044d84f08735d5dd32bd8cacd175357d4510e6cc000";

        const els = {
            brentPrice: document.getElementById('brent_price'),
            brentPercent: document.getElementById('brent_percent'),
            wtiPrice: document.getElementById('wti_price'),
            wtiPercent: document.getElementById('wti_percent'),
            status: document.getElementById('status'),
            timestamp: document.getElementById('timestamp'),
            container: document.getElementById('mainContainer')
        };

        let brentPrev = 0, wtiPrev = 0;

        async function getPrice(code) {
            const res = await fetch(`https://api.oilpriceapi.com/v1/prices/latest?by_code=${code}`, {
                headers: { 
                    'Authorization': `Token ${API_KEY}`,
                    'Content-Type': 'application/json'
                }
            });

            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const json = await res.json();
            return parseFloat(json.data.price || json.data.formatted.replace(/[^0-9.]/g, ''));
        }

        async function fetchOilPrices() {
            try {
                els.status.textContent = "ACTUALIZANDO...";
                els.status.classList.remove('error');

                const [brentPrice, wtiPrice] = await Promise.all([
                    getPrice("BRENT_CRUDE_USD"),
                    getPrice("WTI_USD")
                ]);

                // Actualizar Brent
                if (brentPrev === 0) brentPrev = brentPrice;
                updateDisplay(els.brentPrice, els.brentPercent, brentPrice, brentPrev);
                brentPrev = brentPrice;

                // Actualizar WTI
                if (wtiPrev === 0) wtiPrev = wtiPrice;
                updateDisplay(els.wtiPrice, els.wtiPercent, wtiPrice, wtiPrev);
                wtiPrev = wtiPrice;

                els.container.classList.add('connected');
                els.status.textContent = "LIVE • CONECTADO";
                els.timestamp.textContent = new Date().toLocaleTimeString('es-MX', { hour12: false });

            } catch (err) {
                console.error(err);
                els.status.textContent = "ERROR AL OBTENER DATOS - Reintentando...";
                els.status.classList.add('error');
            }
        }

        function updateDisplay(priceEl, percentEl, newPrice, prevPrice) {
            const diff = prevPrice > 0 ? ((newPrice - prevPrice) / prevPrice) * 100 : 0;
            const isUp = diff >= 0;

            priceEl.textContent = newPrice.toFixed(2);
            percentEl.textContent = `${isUp ? '+' : ''}${diff.toFixed(2)}%`;
            percentEl.style.color = isUp ? 'var(--neon-green)' : 'var(--neon-red)';
            priceEl.className = `price ${isUp ? 'up' : 'down'}`;
        }

        function init() {
            fetchOilPrices();
            setInterval(fetchOilPrices, 10000);   // cada 10 segundos
        }

        window.onload = init;
    </script>
</body>
</html>
