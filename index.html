<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oil Tracker Pro • JUN 2026</title>
    <link href="https://fonts.cdnfonts.com/css/ds-digital" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/odometer.js/0.4.7/themes/odometer-theme-default.css">
    
    <style>
        :root {
            --neon-green: #00ff9d;
            --neon-red: #ff2d55;
            --neon-blue: #00f0ff;
            --bg: #0a0e17;
            --card: #12171f;
        }

        * { box-sizing: border-box; }
        
        body {
            background: linear-gradient(135deg, #0a0e17 0%, #1a2333 100%);
            color: #fff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 15px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: #0c111b;
            padding: 30px 25px;
            border-radius: 28px;
            border: 1px solid #1f2a3f;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 0 90px rgba(0, 240, 255, 0.18),
                        inset 0 0 40px rgba(0,0,0,0.7);
            position: relative;
            overflow: hidden;
        }

        @media (min-width: 768px) {
            .container {
                max-width: 480px;
                padding: 40px 35px;
            }
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .header h1 {
            font-size: 1.05rem;
            color: var(--neon-blue);
            margin: 0;
            letter-spacing: 5px;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(0, 240, 255, 0.6);
        }

        .card {
            background: var(--card);
            border-radius: 22px;
            padding: 22px 18px;
            margin-bottom: 22px;
            border: 1px solid #1f2a3f;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(0, 240, 255, 0.1);
        }

        .label {
            font-size: 0.82rem;
            color: #7eb8ff;
            font-weight: 900;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            display: block;
            margin-bottom: 12px;
        }

        .odometer-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            min-height: 88px;
        }

        .odometer {
            font-family: 'DS-Digital', monospace !important;
            font-size: 4.6rem;
            font-weight: bold;
            line-height: 1;
            letter-spacing: -3px;
        }

        @media (min-width: 768px) {
            .odometer { font-size: 5.2rem; }
        }

        .up { color: var(--neon-green); text-shadow: 0 0 20px var(--neon-green), 0 0 40px rgba(0,255,157,0.7); }
        .down { color: var(--neon-red); text-shadow: 0 0 20px var(--neon-red), 0 0 40px rgba(255,45,85,0.7); }

        .percent {
            font-family: 'Courier New', monospace;
            font-size: 1.45rem;
            font-weight: 700;
            min-width: 90px;
        }

        .status-bar {
            margin-top: 25px;
            padding-top: 18px;
            border-top: 1px solid #1f2a3f;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.68rem;
            color: #666;
        }

        .live-dot {
            display: inline-block;
            width: 9px;
            height: 9px;
            background: #333;
            border-radius: 50%;
            margin-right: 8px;
            vertical-align: middle;
        }

        .connected .live-dot {
            background: var(--neon-green);
            box-shadow: 0 0 15px var(--neon-green);
            animation: pulse 1.4s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.35; }
        }

        .footer {
            text-align: center;
            margin-top: 25px;
            font-size: 0.65rem;
            color: #444;
        }
    </style>
</head>
<body>
    <div class="container" id="mainContainer">
        <div class="header">
            <h1>FUTUROS BRENT • WTI • JUN 2026</h1>
        </div>
        
        <div class="card">
            <span class="label">BRENT CRUDE (ICE) • JUN'26</span>
            <div class="odometer-wrapper">
                <div id="brent_price" class="odometer">000.00</div>
                <div id="brent_percent" class="percent">+0.00%</div>
            </div>
        </div>

        <div class="card">
            <span class="label">WTI CRUDE (NYMEX) • JUN'26</span>
            <div class="odometer-wrapper">
                <div id="wti_price" class="odometer">000.00</div>
                <div id="wti_percent" class="percent">+0.00%</div>
            </div>
        </div>

        <div class="status-bar">
            <span><span class="live-dot"></span><span id="status">CONECTANDO A MERCADO...</span></span>
            <span id="timestamp">--:--:--</span>
        </div>

        <div class="footer">
            Datos simulados en tiempo real • Actualiza cada 8 segundos
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/odometer.js/0.4.7/odometer.min.js"></script>
    <script>
        const elements = {
            brentPrice: document.getElementById('brent_price'),
            brentPercent: document.getElementById('brent_percent'),
            wtiPrice: document.getElementById('wti_price'),
            wtiPercent: document.getElementById('wti_percent'),
            status: document.getElementById('status'),
            timestamp: document.getElementById('timestamp'),
            container: document.getElementById('mainContainer')
        };

        let brentPrev = 101.16;
        let wtiPrev = 97.50;

        function updateUI(priceEl, percentEl, price, prevClose) {
            const diff = ((price - prevClose) / prevClose) * 100;
            const isUp = diff >= 0;

            priceEl.textContent = parseFloat(price).toFixed(2);
            percentEl.textContent = `${isUp ? '+' : ''}${diff.toFixed(2)}%`;

            priceEl.className = `odometer ${isUp ? 'up' : 'down'}`;
            percentEl.style.color = isUp ? 'var(--neon-green)' : 'var(--neon-red)';

            elements.timestamp.textContent = new Date().toLocaleTimeString('es-MX', { hour12: false });
        }

        async function fetchOilPrices() {
            try {
                // Simulación realista (en producción reemplaza con API real como OilPriceAPI)
                const brent = (Math.random() * 6 + 104).toFixed(2);
                const wti = (Math.random() * 7 + 96).toFixed(2);

                updateUI(elements.brentPrice, elements.brentPercent, brent, brentPrev);
                updateUI(elements.wtiPrice, elements.wtiPercent, wti, wtiPrev);

                brentPrev = parseFloat(brent);
                wtiPrev = parseFloat(wti);

                elements.status.textContent = 'LIVE • MERCADO ABIERTO';
                elements.container.classList.add('connected');

            } catch (e) {
                elements.status.textContent = 'ERROR DE CONEXIÓN';
            }
        }

        function init() {
            // Valores iniciales más realistas (basados en datos recientes)
            elements.brentPrice.textContent = "108.45";
            elements.wtiPrice.textContent = "97.80";

            fetchOilPrices();
            setInterval(fetchOilPrices, 8000); // Actualiza cada 8 segundos
        }

        window.onload = init;
    </script>
</body>
</html>
