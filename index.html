<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal de Trading de Petróleo | Ultra Pro</title>
    <link href="https://fonts.cdnfonts.com/css/ds-digital" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/odometer.js/0.4.7/themes/odometer-theme-default.css">
    
    <style>
        :root { --neon-green: #39FF14; --neon-red: #ff3131; --bg-dark: #000c18; }
        body { background: var(--bg-dark); color: #fff; font-family: 'Inter', -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        
        .container { background: #000; padding: 35px; border-radius: 28px; border: 1px solid #002a4d; text-align: center; width: 360px; box-shadow: 0 10px 80px rgba(0,42,77,0.5); }
        h1 { font-size: 0.7rem; color: #444; margin: 0 0 30px; letter-spacing: 5px; text-transform: uppercase; font-weight: 900; }
        
        .card { margin-bottom: 25px; padding: 20px; background: #050505; border-radius: 16px; border: 1px solid #111; position: relative; }
        .label { font-size: 0.75rem; color: #5bc0de; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }
        
        /* Estilos de LCD y Odómetro */
        .odometer-wrapper { display: flex; align-items: baseline; justify-content: center; margin-top: 10px; }
        .price-odometer { 
            font-family: 'DS-Digital', monospace; 
            font-size: 4rem; 
            font-weight: bold; 
            transition: color 0.3s ease; 
        }
        .price-odometer.up { color: var(--neon-green); text-shadow: 0 0 10px rgba(0, 255, 20, 0.4); }
        .price-odometer.down { color: var(--neon-red); text-shadow: 0 0 10px rgba(255, 49, 49, 0.4); }
        
        /* Porcentaje */
        .percent { font-size: 1.1rem; color: #666; font-weight: 600; font-family: 'Courier New', monospace; margin-left: 10px; }
        
        /* Barra de estado */
        .status-bar { font-size: 0.6rem; color: #444; margin-top: 25px; display: flex; justify-content: space-between; align-items: center; }
        .live-dot { height: 7px; width: 7px; background: #444; border-radius: 50%; display: inline-block; margin-right: 7px; transition: background 0.3s; }
        .connected .live-dot { background: var(--neon-green); box-shadow: 0 0 8px var(--neon-green); animation: pulse 1s infinite; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="container" id="mainContainer">
        <h1>FUTUROS DE PETRÓLEO JUN-26</h1>
        
        <div class="card">
            <span class="label">BRENT CRUDE OIL</span>
            <div class="odometer-wrapper">
                <div id="BINANCE:BRENT" class="price-odometer odometer">0</div>
                <div id="UKOIL_percent" class="percent">(--.--%)</div>
            </div>
        </div>

        <div class="card">
            <span class="label">WTI CRUDE (OIL)</span>
            <div class="odometer-wrapper">
                <div id="ICEM:WTI" class="price-odometer odometer">0</div>
                <div id="USOIL_percent" class="percent">(--.--%)</div>
            </div>
        </div>

        <div class="status-bar">
            <span><span class="live-dot"></span> <span id="status">DISCONNECTED</span></span>
            <span id="timestamp">--:--:--</span>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/odometer.js/0.4.7/odometer.min.js"></script>

    <script>
        const apiKey = 'd775n0hr01qtg3nfne1gd775n0hr01qtg3nfne20';
        // Tickers de OANDA con alto tráfico y fidelidad a Investing.com
        const symbols = {
            'OANDA:BCO_USD': { id: 'BINANCE:BRENT', percentId: 'UKOIL_percent' },
            'OANDA:WTICO_USD': { id: 'ICEM:WTI', percentId: 'USOIL_percent' }
        };

        const socket = new WebSocket(`wss://ws.finnhub.io?token=${apiKey}`);
        let lastPrices = {};
        let yesterdayCloses = {};

        // 1. Cargar precios iniciales y cierre de ayer vía REST
        async function loadInitialData() {
            for (const [key, config] of Object.entries(symbols)) {
                try {
                    const response = await fetch(`https://finnhub.io/api/v1/quote?symbol=${key}&token=${apiKey}`);
                    const data = await response.json();
                    if (data.pc) yesterdayCloses[config.id] = data.pc;
                    if (data.c) updateUI(config.id, data.c);
                } catch (e) { console.error("Error en carga inicial:", e); }
            }
        }

        // 2. Escuchar el stream de WebSockets para cambios en tiempo real
        socket.addEventListener('open', () => {
            document.getElementById('mainContainer').classList.add('connected');
            document.getElementById('status').innerText = 'LIVE STREAM OANDA';
            Object.keys(symbols).forEach(s => {
                socket.send(JSON.stringify({'type':'subscribe', 'symbol': s}));
            });
            loadInitialData();
        });

        socket.addEventListener('message', (event) => {
            const data = JSON.parse(event.data);
            if (data.type === 'trade') {
                data.data.forEach(trade => {
                    const config = symbols[trade.s];
                    if (config) updateUI(config.id, trade.p);
                });
            }
        });

        function updateUI(id, price) {
            const el = document.getElementById(id);
            const percentEl = document.getElementById(`${id}_percent`);
            if (!el || !percentEl) return;

            const oldPrice = lastPrices[id] || yesterdayCloses[id] || price;
            const yesterdayClose = yesterdayCloses[id] || price;
            
            // Actualizar Odómetro (La librería maneja la animación)
            el.innerHTML = price.toFixed(2);
            lastPrices[id] = price;

            // Calcular y mostrar porcentaje
            const diff = price - yesterdayClose;
            const percentChange = (diff / yesterdayClose) * 100;
            percentEl.innerText = `(${percentChange.toFixed(2)}%)`;

            // Efecto visual de color
            if (price > yesterdayClose) {
                el.className = 'price-odometer odometer up';
            } else if (price < yesterdayClose) {
                el.className = 'price-odometer odometer down';
            } else {
                el.className = 'price-odometer odometer';
            }

            document.getElementById('timestamp').innerText = new Date().toLocaleTimeString();
        }

        socket.onclose = () => {
            document.getElementById('status').innerText = 'OFFLINE';
            document.getElementById('mainContainer').classList.remove('connected');
        };
    </script>
</body>
</html>
