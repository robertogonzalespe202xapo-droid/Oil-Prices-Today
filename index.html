<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oil Tracker Ultra | Fix v3</title>
    <style>
        :root { --neon-green: #39FF14; --neon-red: #ff3131; --bg-dark: #000c18; }
        body { background: var(--bg-dark); color: #fff; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #050505; padding: 30px; border-radius: 24px; border: 1px solid #1a1a1a; text-align: center; width: 340px; box-shadow: 0 20px 60px rgba(0,0,0,0.8); transition: opacity 0.5s; }
        h1 { font-size: 0.7rem; color: #666; margin: 0 0 25px; letter-spacing: 4px; text-transform: uppercase; }
        .card { margin-bottom: 20px; padding: 15px; background: #0a0a0a; border-radius: 12px; border: 1px solid #111; }
        .label { font-size: 0.75rem; color: #5bc0de; font-weight: 600; text-transform: uppercase; }
        .price { font-family: 'Courier New', monospace; font-size: 3.5rem; font-weight: bold; margin: 5px 0; transition: color 0.3s ease; }
        .up { color: var(--neon-green); }
        .down { color: var(--neon-red); }
        .status-bar { font-size: 0.6rem; color: #444; margin-top: 20px; display: flex; justify-content: space-between; align-items: center; }
        .live-dot { height: 8px; width: 8px; background: #444; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .connected .live-dot { background: var(--neon-green); box-shadow: 0 0 8px var(--neon-green); animation: pulse 1.2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="container" id="mainContainer">
        <h1>DATA STREAM JUN-26</h1>
        
        <div class="card">
            <span class="label">BRENT CRUDE (USD)</span>
            <div id="UKOIL" class="price">--.--</div>
        </div>

        <div class="card">
            <span class="label">WTI CRUDE (USD)</span>
            <div id="USOIL" class="price">--.--</div>
        </div>

        <div class="status-bar">
            <span><span class="live-dot"></span> <span id="status">CONNECTING...</span></span>
            <span id="timestamp">--:--:--</span>
        </div>
    </div>

    <script>
        const apiKey = 'd775n0hr01qtg3nfne1gd775n0hr01qtg3nfne20';
        // Usamos OANDA como proveedor de CFD, que es mucho más activo en el feed gratuito de Finnhub
        const symbols = {
            'OANDA:BRENT_CASH': 'UKOIL',
            'OANDA:WTICO_USD': 'USOIL'
        };

        const socket = new WebSocket(`wss://ws.finnhub.io?token=${apiKey}`);
        let lastPrices = {};

        // 1. Cargar precios iniciales vía REST (para evitar los ceros al inicio)
        async function loadInitialPrices() {
            for (const [key, id] of Object.entries(symbols)) {
                try {
                    const response = await fetch(`https://finnhub.io/api/v1/quote?symbol=${key}&token=${apiKey}`);
                    const data = await response.json();
                    if (data.c) updateUI(id, data.c);
                } catch (e) { console.error("Error cargando precio inicial:", e); }
            }
        }

        // 2. Escuchar el stream de WebSockets para cambios en tiempo real
        socket.addEventListener('open', () => {
            document.getElementById('mainContainer').classList.add('connected');
            document.getElementById('status').innerText = 'LIVE STREAM';
            Object.keys(symbols).forEach(s => {
                socket.send(JSON.stringify({'type':'subscribe', 'symbol': s}));
            });
            loadInitialPrices();
        });

        socket.addEventListener('message', (event) => {
            const data = JSON.parse(event.data);
            if (data.type === 'trade') {
                data.data.forEach(trade => {
                    const elementId = symbols[trade.s];
                    if (elementId) updateUI(elementId, trade.p);
                });
            }
        });

        function updateUI(id, price) {
            const el = document.getElementById(id);
            const oldPrice = lastPrices[id] || price;
            
            if (price > oldPrice) el.className = 'price up';
            else if (price < oldPrice) el.className = 'price down';

            el.innerText = price.toFixed(2);
            lastPrices[id] = price;
            document.getElementById('timestamp').innerText = new Date().toLocaleTimeString();
        }

        socket.onclose = () => {
            document.getElementById('status').innerText = 'OFFLINE';
            document.getElementById('mainContainer').classList.remove('connected');
        };
    </script>
</body>
</html>
