<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oil Tracker Pro • 2026</title>
    <style>
        :root {
            --primary: #0a1625;
            --accent: #00d4c8;
            --text: #e0f0ff;
            --card-bg: #111b2b;
            --border: #1e2a40;
            --success: #00c4b4;
            --warning: #f5a623;
            --live: #ff4757;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: linear-gradient(180deg, #0a1625 0%, #05101c 100%);
            color: var(--text);
            font-family: system-ui, sans-serif;
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center; padding: 20px;
        }

        .main-layout {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1000px;
        }

        .container {
            background: #0a1625;
            padding: 25px;
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header h2 { font-size: 1rem; color: #fff; text-transform: uppercase; letter-spacing: 1px; }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .price-val {
            font-family: monospace;
            font-size: 3rem;
            display: block;
            margin: 10px 0;
            color: #fff;
        }

        .label { font-size: 0.7rem; font-weight: bold; color: #7eb8ff; }
        
        .status-footer {
            font-size: 0.7rem;
            color: #6b8aa8;
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid var(--border);
        }

        .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; background: #333; }
        .dot-online { background: var(--success); box-shadow: 0 0 10px var(--success); }
        .dot-ws { background: var(--live); box-shadow: 0 0 10px var(--live); }

        /* Consola y Modal */
        .btn-tool { background: #1e2a40; border: none; color: white; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        .modal { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); 
            z-index: 100; align-items: center; justify-content: center; 
        }
        .modal-inner { background: #0a1625; width: 90%; max-width: 500px; border-radius: 20px; border: 1px solid var(--border); padding: 20px; }
        .log-box { height: 300px; overflow-y: auto; background: #05101c; font-family: monospace; font-size: 0.75rem; padding: 10px; border-radius: 10px; }
        .log-entry { margin-bottom: 5px; border-bottom: 1px solid #111b2b; padding-bottom: 2px; }
    </style>
</head>
<body>

    <div class="main-layout">
        <div class="container">
            <div class="header">
                <h2>REST API Snapshot</h2>
                <div>
                    <button class="btn-tool" onclick="openModal('modalLogs')">📋</button>
                    <button class="btn-tool" onclick="openModal('modalHistory')">💾</button>
                </div>
            </div>
            
            <div class="card">
                <span class="label">BRENT CRUDE (API)</span>
                <span id="api_brent" class="price-val">--.--</span>
            </div>
            <div class="card">
                <span class="label">WTI CRUDE (API)</span>
                <span id="api_wti" class="price-val">--.--</span>
            </div>

            <div class="status-footer">
                <span><span id="api_dot" class="dot"></span> MODO: AUTOMÁTICO</span>
                <span id="api_time">--:--:--</span>
            </div>
        </div>

        <div class="container" style="border-color: var(--live);">
            <div class="header">
                <h2 style="color: var(--live);">Live WebSocket</h2>
            </div>
            
            <div class="card" style="border-color: rgba(255, 71, 87, 0.3);">
                <span class="label" style="color: var(--live);">BRENT REAL-TIME</span>
                <span id="ws_brent" class="price-val" style="color: var(--live);">--.--</span>
            </div>
            <div class="card" style="border-color: rgba(255, 71, 87, 0.3);">
                <span class="label" style="color: var(--live);">WTI REAL-TIME</span>
                <span id="ws_wti" class="price-val" style="color: var(--live);">--.--</span>
            </div>

            <div class="status-footer">
                <span><span id="ws_dot" class="dot"></span> WS: <span id="ws_status">OFFLINE</span></span>
                <span id="ws_time">--:--:--</span>
            </div>
        </div>
    </div>

    <div id="modalLogs" class="modal">
        <div class="modal-inner">
            <h3>Consola del Sistema</h3>
            <div id="con_logs" class="log-box"></div>
            <button class="btn-tool" style="width:100%; margin-top:10px;" onclick="closeModal('modalLogs')">Cerrar</button>
        </div>
    </div>

    <div id="modalHistory" class="modal">
        <div class="modal-inner">
            <h3>Historial de Precios</h3>
            <div id="his_logs" class="log-box"></div>
            <button class="btn-tool" style="width:100%; margin-top:10px;" onclick="closeModal('modalHistory')">Cerrar</button>
        </div>
    </div>

    <script>
        const CONFIG = {
            key: "d0fe91b38b11caf283f0fe96e05992e7f3807eae0455325cd76e1f988477b685",
            api_url: "https://api.oilpriceapi.com/v1/prices/latest",
            ws_url: "wss://api.oilpriceapi.com/cable"
        };

        let history = JSON.parse(localStorage.getItem('oil_history')) || [];

        // --- SISTEMA DE LOGS ---
        function sysLog(msg, color = "#7eb8ff") {
            const box = document.getElementById('con_logs');
            const time = new Date().toLocaleTimeString();
            box.innerHTML = `<div class="log-entry"><span style="color:#555">[${time}]</span> <span style="color:${color}">${msg}</span></div>` + box.innerHTML;
        }

        function saveHistory(b, w) {
            const entry = { t: new Date().toLocaleString(), b, w };
            history.unshift(entry);
            history = history.slice(0, 50);
            localStorage.setItem('oil_history', JSON.stringify(history));
            renderHistory();
        }

        function renderHistory() {
            const box = document.getElementById('his_logs');
            box.innerHTML = history.map(h => `
                <div class="log-entry">
                    <b>${h.t}</b><br>
                    Brent: $${h.b} | WTI: $${h.w}
                </div>
            `).join('');
        }

        // --- LÓGICA API (REST) ---
        async function fetchAPI() {
            document.getElementById('api_dot').classList.add('dot-online');
            sysLog("Iniciando petición API...", "#00d4c8");
            
            try {
                const fetchPrice = async (code) => {
                    const r = await fetch(`${CONFIG.api_url}?by_code=${code}`, {
                        headers: { 'Authorization': `Token ${CONFIG.key}` }
                    });
                    const d = await r.json();
                    return d.data.price;
                };

                const brent = await fetchPrice("BRENT_CRUDE_USD");
                const wti = await fetchPrice("WTI_USD");

                document.getElementById('api_brent').textContent = brent.toFixed(2);
                document.getElementById('api_wti').textContent = wti.toFixed(2);
                document.getElementById('api_time').textContent = new Date().toLocaleTimeString();
                
                saveHistory(brent.toFixed(2), wti.toFixed(2));
                sysLog("Datos API actualizados correctamente", "#00c4b4");
            } catch (e) {
                sysLog("Error API: " + e.message, "#ff6b6b");
            }
            
            setTimeout(() => document.getElementById('api_dot').classList.remove('dot-online'), 1000);
        }

        // --- LÓGICA WEBSOCKET ---
        let socket;
        function connectWS() {
            socket = new WebSocket(CONFIG.ws_url);

            socket.onopen = () => {
                sysLog("WS: Conectando con servidor...", "#ff4757");
                // Importante: Suscripción exacta para ActionCable
                const sub = {
                    command: "subscribe",
                    identifier: JSON.stringify({ channel: "PriceChannel", api_key: CONFIG.key })
                };
                socket.send(JSON.stringify(sub));
            };

            socket.onmessage = (e) => {
                const data = JSON.parse(e.data);
                
                if (data.type === "welcome") sysLog("WS: Bienvenido. Suscribiendo...");
                if (data.type === "confirm_subscription") {
                    sysLog("WS: SUSCRIPCIÓN ACTIVA", "#00c4b4");
                    document.getElementById('ws_dot').classList.add('dot-ws');
                    document.getElementById('ws_status').textContent = "ONLINE";
                    document.getElementById('ws_status').style.color = "var(--success)";
                }

                if (data.message) {
                    const price = parseFloat(data.message.price).toFixed(2);
                    const code = data.message.code;
                    
                    if (code === "BRENT_CRUDE_USD") {
                        updateWSPrice('ws_brent', price);
                    } else if (code === "WTI_USD") {
                        updateWSPrice('ws_wti', price);
                    }
                    document.getElementById('ws_time').textContent = new Date().toLocaleTimeString();
                }
            };

            socket.onclose = () => {
                document.getElementById('ws_dot').classList.remove('dot-ws');
                document.getElementById('ws_status').textContent = "OFFLINE";
                sysLog("WS: Conexión perdida. Reintentando...", "#f5a623");
                setTimeout(connectWS, 5000);
            };
        }

        function updateWSPrice(id, val) {
            const el = document.getElementById(id);
            el.textContent = val;
            el.style.transform = "scale(1.1)";
            setTimeout(() => el.style.transform = "scale(1)", 150);
        }

        // --- CONTROL UI ---
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        // --- INICIO ---
        renderHistory();
        fetchAPI();
        connectWS();
        // Actualizar API cada hora (o según necesites)
        setInterval(fetchAPI, 3600000);
    </script>
</body>
</html>
