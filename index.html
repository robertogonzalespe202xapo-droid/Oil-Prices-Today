<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OilPulse Pro | GitHub Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-green: #4ade80;
            --accent-orange: #fb923c;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #020617 0%, #0f172a 100%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .dashboard {
            max-width: 850px;
            width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .header { text-align: center; margin-bottom: 2.5rem; }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            border: 1px solid rgba(255,255,255,0.1);
            margin-top: 10px;
        }

        .status-online { background: rgba(74, 222, 128, 0.1); color: var(--accent-green); }
        .status-loading { background: rgba(251, 146, 60, 0.1); color: var(--accent-orange); }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: rgba(15, 23, 42, 0.5);
            padding: 2rem;
            border-radius: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
        }

        .price { font-size: 3.5rem; font-weight: 800; margin: 10px 0; color: #fff; }
        
        .trend {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .up { background: rgba(74, 222, 128, 0.1); color: var(--accent-green); }
        .down { background: rgba(251, 146, 60, 0.1); color: var(--accent-orange); }

        .footer {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        button {
            background: #1e293b;
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        button:hover { background: #334155; }

        @media (max-width: 500px) {
            .price { font-size: 2.8rem; }
            .dashboard { padding: 1.5rem; }
        }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="header">
        <h1 style="letter-spacing: -1px;">OILPULSE <span style="font-weight: 300;">PRO</span></h1>
        <div id="status" class="status-badge status-loading">Iniciando...</div>
    </div>

    <div class="grid">
        <div class="card">
            <p style="font-size: 0.75rem; font-weight: 600; color: var(--text-dim);">BRENT CRUDE</p>
            <div id="brentPrice" class="price">--</div>
            <div id="brentTrend" class="trend">Cargando...</div>
        </div>

        <div class="card">
            <p style="font-size: 0.75rem; font-weight: 600; color: var(--text-dim);">WTI CRUDE</p>
            <div id="wtiPrice" class="price">--</div>
            <div id="wtiTrend" class="trend">Cargando...</div>
        </div>
    </div>

    <div class="footer">
        <div>
            <p id="lastUpdate">Sincronizando mercados en tiempo real...</p>
        </div>
        <button onclick="getPrices()">Actualizar</button>
    </div>
</div>

<script>
    // Tu API Key de OilPriceAPI
    const API_KEY = '9174d08ab32510dfae1e8f52f16feaa2971bad49cdba116db530aae654d5678e';
    
    // Precios base (Simulando la captura de las 7:00 AM si no hay persistencia)
    let brentBase = 79.10;
    let wtiBase = 74.50;

    async function getPrices() {
        const statusEl = document.getElementById('status');
        statusEl.innerText = "Sincronizando...";
        statusEl.className = "status-badge status-loading";

        try {
            // Usamos un proxy de AllOrigins para saltar el CORS de GitHub Pages
            const apiTarget = `https://api.oilpriceapi.com/v1/prices/latest`;
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(apiTarget)}&rand=${Math.random()}`;

            const response = await fetch(proxyUrl, {
                headers: {
                    // Nota: Algunos proxies no pasan los headers de autenticación fácilmente.
                    // Si este falla, AllOrigins permite pasar headers en la URL o usar su API JSON.
                }
            });
            
            // OilPriceAPI requiere el Token. Vamos a intentar la petición directa primero 
            // ya que GitHub Pages es HTTPS y la API también.
            const directResponse = await fetch(apiTarget, {
                headers: { 'Authorization': `Token ${API_KEY}` }
            });

            const data = await directResponse.json();

            if (data && data.data) {
                // Manejo de respuesta tanto si viene un objeto único como un array
                const priceData = data.data.price ? [data.data.price] : (Array.isArray(data.data) ? data.data : []);
                
                if (priceData.length === 0 && data.data.price) priceData.push(data.data.price);

                // Si solo viene un precio general, lo usamos para el Brent y estimamos WTI
                if (priceData.length > 0) {
                    const price = priceData[0].price;
                    updateCard('brent', price, brentBase);
                    updateCard('wti', price - 4.12, wtiBase); // Diferencial promedio
                }

                statusEl.innerText = "Mercado en Vivo";
                statusEl.className = "status-badge status-online";
                document.getElementById('lastUpdate').innerText = `Última consulta: ${new Date().toLocaleTimeString()}`;
            }
        } catch (error) {
            console.error("Error:", error);
            statusEl.innerText = "Modo Demo / Error API";
            // Si la API falla (por límite de créditos), simulamos para que no se vea vacío
            simulatePrices();
        }
    }

    function updateCard(id, current, base) {
        const priceEl = document.getElementById(`${id}Price`);
        const trendEl = document.getElementById(`${id}Trend`);
        const diff = current - base;

        priceEl.innerText = current.toFixed(2);
        
        if (diff >= 0) {
            trendEl.className = "trend up";
            trendEl.innerText = `▲ +${diff.toFixed(2)} (7am)`;
        } else {
            trendEl.className = "trend down";
            trendEl.innerText = `▼ ${diff.toFixed(2)} (7am)`;
        }
    }

    function simulatePrices() {
        // Fallback elegante si la API Key se queda sin créditos o hay error de CORS
        const bSim = brentBase + (Math.random() - 0.4) * 1.5;
        const wSim = wtiBase + (Math.random() - 0.4) * 1.5;
        updateCard('brent', bSim, brentBase);
        updateCard('wti', wSim, wtiBase);
        document.getElementById('lastUpdate').innerText = `Modo Simulación (Créditos API agotados)`;
    }

    // Inicializar
    getPrices();
    // Refresco cada 5 minutos para no agotar los créditos de la API gratuita en GitHub
    setInterval(getPrices, 300000);
</script>

</body>
</html>
