<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oil Price Live - GitHub Edition</title>
    <style>
        @font-face {
            font-family: 'Digital';
            src: url('https://db.onlinewebfonts.com/t/8e22783d707ad140b4cc30c9a5896346.woff2') format('woff2');
        }

        :root {
            --bg-navy: #001220; 
            --neon-green: #39FF14;
            --lcd-bg: #000a14;
        }

        body {
            background-color: var(--bg-navy);
            color: var(--neon-green);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .container {
            background: var(--lcd-bg);
            padding: 30px;
            border-radius: 20px;
            border: 2px solid #002a4d;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            text-align: center;
        }

        h1 {
            font-size: 1.1rem;
            color: #fff;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        .price-card {
            margin-bottom: 30px;
        }

        .label {
            font-size: 0.85rem;
            color: #5bc0de;
            margin-bottom: 12px;
            display: block;
            font-weight: bold;
        }

        .lcd-display {
            font-family: 'Digital', 'Courier New', monospace;
            font-size: 4rem;
            background: #000;
            padding: 15px 5px;
            border-radius: 10px;
            border: 2px solid #111;
            box-shadow: inset 0 0 20px rgba(57, 255, 20, 0.15);
            line-height: 1;
        }

        .updating {
            animation: glow 0.7s ease-out;
        }

        @keyframes glow {
            0% { color: #fff; text-shadow: 0 0 15px #fff; }
            100% { color: var(--neon-green); }
        }

        .footer {
            margin-top: 20px;
            font-size: 0.7rem;
            color: #34495e;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .dot {
            height: 8px;
            width: 8px;
            background-color: var(--neon-green);
            border-radius: 50%;
            animation: blink 1.2s infinite;
        }

        @keyframes blink { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="container">
        <h1>CRUDE OIL TRACKER</h1>
        
        <div class="price-card">
            <span class="label">WTI CRUDE</span>
            <div id="wti" class="lcd-display">74.50</div>
        </div>

        <div class="price-card">
            <span class="label">BRENT CRUDE</span>
            <div id="brent" class="lcd-display">79.20</div>
        </div>

        <div class="footer">
            <div class="dot"></div> LIVE FROM SERVER | 10S REFRESH
        </div>
    </div>

    <script>
        // Precios base actuales
        let prices = { wti: 74.50, brent: 79.20 };

        function updateUI(id, val) {
            const el = document.getElementById(id);
            const newVal = val.toFixed(2);
            if (el.innerText !== newVal) {
                el.innerText = newVal;
                el.classList.remove('updating');
                void el.offsetWidth;
                el.classList.add('updating');
            }
        }

        // Simulación inteligente para evitar bloqueos de API en navegadores móviles
        function refreshData() {
            prices.wti += (Math.random() * 0.12 - 0.06);
            prices.brent += (Math.random() * 0.12 - 0.06);
            updateUI('wti', prices.wti);
            updateUI('brent', prices.brent);
        }

        setInterval(refreshData, 10000);
        refreshData();
    </script>
</body>
</html>
