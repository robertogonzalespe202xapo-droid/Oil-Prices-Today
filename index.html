<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>OIL IMPERIVM • Live Monitor</title>
    <style>
        :root {
            --neon-blue: #00f0ff;
            --deep-ocean: #001a33;
            --gold: #ffd700;
        }

        body {
            /* Efecto de agua brillante con degradado animado */
            background: radial-gradient(circle at center, #004d66 0%, #001a33 70%, #00050a 100%);
            background-size: 200% 200%;
            animation: waterGlow 8s ease-in-out infinite;
            color: #fff;
            font-family: 'Times New Roman', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        @keyframes waterGlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Añade un brillo extra tipo "reflejo de agua" */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png'); /* Sutil textura para difuminar el brillo */
            opacity: 0.1;
            pointer-events: none;
        }

        /* Pilares laterales - Cambiado a .png */
        .pilar {
            position: fixed;
            top: 0;
            height: 100vh;
            width: 15vw;
            background-repeat: no-repeat;
            background-size: contain;
            z-index: 5;
            filter: drop-shadow(0 0 15px var(--neon-blue)); /* Brillo en los pilares */
        }
        .left { left: 5px; background-image: url("image_dc1a43.png"); }
        .right { right: 5px; background-image: url("image_dc1a43.png"); transform: scaleX(-1); }

        .container {
            width: 400px;
            z-index: 10;
            text-align: center;
        }

        /* Bordes romanos */
        .card {
            background: rgba(0, 20, 40, 0.85); /* Fondo azul marino semitransparente */
            margin-bottom: 25px;
            padding: 30px;
            border: 20px solid transparent;
            border-image-source: url("image_dc039d.png");
            border-image-slice: 27;
            border-image-repeat: stretch;
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.4), inset 0 0 20px rgba(0, 240, 255, 0.1);
            backdrop-filter: blur(5px); /* Efecto de cristal esmerilado */
        }

        .label { color: var(--gold); letter-spacing: 3px; font-size: 1rem; text-shadow: 1px 1px 2px #000; }
        .price { font-family: monospace; font-size: 3.8rem; text-shadow: 0 0 15px var(--neon-blue); color: #e6ffff; }

        #console {
            position: fixed;
            bottom: 20px;
            width: 320px;
            background: rgba(0, 10, 20, 0.9);
            border: 1px solid var(--neon-blue);
            padding: 10px;
            font-family: monospace;
            font-size: 0.75rem;
            color: #00ffcc;
            max-height: 100px;
            overflow-y: auto;
            box-shadow: 0 0 10px var(--neon-blue);
        }
    </style>
</head>
<body>

    <div class="pilar left"></div>
    <div class="pilar right"></div>

    <div class="container">
        <h1 style="color:var(--gold); letter-spacing: 8px; text-shadow: 2px 2px 4px #000;">OIL IMPERIVM</h1>
        
        <div class="card">
            <div class="label">BRENT CRUDE</div>
            <div id="brent" class="price">--.--</div>
        </div>

        <div class="card">
            <div class="label">WTI CRUDE</div>
            <div id="wti" class="price">--.--</div>
        </div>
    </div>

    <div id="console">Iniciando sistema...</div>

    <script>
        const log = (msg) => {
            const c = document.getElementById('console');
            const time = new Date().toLocaleTimeString();
            c.innerHTML += `<div>[${time}] > ${msg}</div>`;
            c.scrollTop = c.scrollHeight;
        };

        const TOKEN = "d0fe91b38b11caf283f0fe96e05992e7f3807eae0455325cd76e1f988477b685";
        
        function connect() {
            log("Sincronizando con los oráculos de crudo...");
            const ws = new WebSocket(`wss://api.oilpriceapi.com/cable?token=${TOKEN}`);

            ws.onopen = () => {
                log("Conexión Imperial establecida.");
                ws.send(JSON.stringify({
                    command: "subscribe",
                    identifier: JSON.stringify({ channel: "EnergyPricesChannel" })
                }));
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === "ping") return;
                
                if (data.message && data.message.price) {
                    const p = data.message;
                    log(`Update: ${p.code} -> $${p.price.toFixed(2)}`);
                    if (p.code === "BRENT_CRUDE") document.getElementById('brent').textContent = p.price.toFixed(2);
                    if (p.code === "WTI_CRUDE") document.getElementById('wti').textContent = p.price.toFixed(2);
                }
            };

            ws.onerror = () => log("Interrupción en la señal. Reintentando...");
            ws.onclose = () => setTimeout(connect, 5000);
        }

        connect();
    </script>
</body>
</html>
