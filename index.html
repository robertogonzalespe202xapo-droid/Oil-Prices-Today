<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oil Tracker Pro • JUN 2026</title>
    
    <style>
        :root {
            --neon-green: #00ff9d;
            --neon-red: #ff2d55;
            --neon-blue: #00f0ff;
            --bg: #0a0e17;
            --card: #12171f;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: linear-gradient(135deg, #0a0e17 0%, #1a2333 100%);
            color: #fff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            overflow: hidden;
        }

        .container {
            background: #0c111b;
            padding: 35px 25px;
            border-radius: 28px;
            border: 1px solid #1f2a3f;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 0 100px rgba(0, 240, 255, 0.15),
                        inset 0 0 50px rgba(0,0,0,0.8);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: clamp(1rem, 4vw, 1.25rem);
            color: var(--neon-blue);
            letter-spacing: 6px;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(0, 240, 255, 0.7);
        }

        .card {
            background: var(--card);
            border-radius: 24px;
            padding: 24px 20px;
            margin-bottom: 24px;
            border: 1px solid #1f2a3f;
            box-shadow: 0 10px 35px rgba(0,0,0,0.7);
        }

        .label {
            font-size: 0.85rem;
            color: #7eb8ff;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        /* Precio digital grande y estable */
        .price {
            font-family: 'DS-Digital', monospace;
            font-size: clamp(3.8rem, 12vw, 5.8rem);
            font-weight: bold;
            line-height: 1;
            letter-spacing: -4px;
            margin-bottom: 8px;
            display: block;
        }

        .up { color: var(--neon-green); text-shadow: 0 0 25px var(--neon-green), 0 0 50px rgba(0,255,157,0.8); }
        .down { color: var(--neon-red); text-shadow: 0 0 25px var(--neon-red), 0 0 50px rgba(255,45,85,0.8); }

        .percent {
            font-family: 'Courier New', monospace;
            font-size: 1.6rem;
            font-weight: 700;
        }

        .row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            flex-wrap: nowrap;
        }

        .status-bar {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #1f2a3f;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.73rem;
            color: #777;
        }

        .live-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #333;
            border-radius: 50%;
            margin-right: 8px;
        }

        .connected .live-dot {
            background: var(--neon-green);
            box-shadow: 0 0 18px var(--neon-green);
            animation: pulse 1.4s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .footer {
            text-align: center;
            margin-top: 25px;
            font-size: 0.68rem;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="container" id="mainContainer">
        <div class="header">
            <h1>FUTUROS BRENT • WTI • JUN 2026</h1>
        </div>
        
        <div class="card">
            <span class="label">BRENT CRUDE (ICE) • JUN'26</span>
            <div class="row">
                <span id="brent_price" class="price">000.00</span>
                <span id="brent_percent" class="percent">+0.00%</span>
            </div>
        </div>

        <div class="card">
            <span class="label">WTI CRUDE (NYMEX) • JUN'26</span>
            <div class="row">
                <span id="wti_price" class="price">000.00</span>
                <span id="wti_percent" class="percent">+0.00%</span>
            </div>
        </div>

        <div class="status-bar">
            <span><span class="live-dot"></span><span id="status">CONECTANDO AL MERCADO...</span></span>
            <span id="timestamp">--:--:--</span>
        </div>

        <div class="footer">
            Datos simulados en tiempo real • Brent & WTI Junio 2026
        </div>
    </div>

    <script>
        const elements = {
            brentPrice: document.getElementById('brent_price'),
            brentPercent: document.getElementById('brent_percent'),
            wtiPrice: document.getElementById('wti_price'),
            wtiPercent: document.getElementById('wti_percent'),
            status: document.getElementById('status'),
            timestamp: document.getElementById('timestamp'),
            container: document.getElementById('mainContainer')
        };

        let brentPrev = 107.35;
        let wtiPrev = 99.15;

        function updateUI(priceEl, percentEl, price, prevClose) {
            const diff = ((price - prevClose) / prevClose) * 100;
            const isUp = diff >= 0;

            priceEl.textContent = parseFloat(price).toFixed(2);
            percentEl.textContent = `${isUp ? '+' : ''}${diff.toFixed(2)}%`;

            priceEl.className = `price ${isUp ? 'up' : 'down'}`;
            percentEl.style.color = isUp ? 'var(--neon-green)' : 'var(--neon-red)';

            elements.timestamp.textContent = new Date().toLocaleTimeString('es-MX', { hour12: false });
        }

        function fetchOilPrices() {
            const brent = (Math.random() * 5 + 104).toFixed(2);
            const wti   = (Math.random() * 6 + 96).toFixed(2);

            updateUI(elements.brentPrice, elements.brentPercent, brent, brentPrev);
            updateUI(elements.wtiPrice, elements.wtiPercent, wti, wtiPrev);

            brentPrev = parseFloat(brent);
            wtiPrev   = parseFloat(wti);

            elements.status.textContent = 'LIVE • MERCADO EN TIEMPO REAL';
            elements.container.classList.add('connected');
        }

        function init() {
            elements.brentPrice.textContent = "107.35";
            elements.wtiPrice.textContent = "99.15";
            elements.brentPrice.className = "price up";
            elements.wtiPrice.className = "price up";

            fetchOilPrices();
            setInterval(fetchOilPrices, 7000);
        }

        window.onload = init;
    </script>
</body>
</html>
