<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oil Tracker Pro • 2026</title>
    
    <style>
        :root {
            --primary: #0a1625;
            --accent: #00d4c8;
            --text: #e0f0ff;
            --card-bg: #111b2b;
            --border: #1e2a40;
            --success: #00c4b4;
            --warning: #f5a623;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: linear-gradient(180deg, #0a1625 0%, #05101c 100%);
            color: var(--text);
            font-family: system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: #0a1625;
            padding: 32px 28px;
            border-radius: 28px;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 440px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
        }

        .header h1 { font-size: 1.1rem; font-weight: 600; color: #fff; }
        
        .header-actions { display: flex; gap: 8px; }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid var(--border);
            text-align: center;
        }

        .label {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: #7eb8ff;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .price-main {
            font-family: monospace;
            font-size: 4.2rem;
            font-weight: 500;
            color: #fff;
            margin: 12px 0 20px;
        }

        .stat-row { display: flex; gap: 12px; }

        .stat-box {
            font-size: 0.78rem;
            padding: 8px;
            border-radius: 12px;
            flex: 1;
            font-weight: 600;
        }

        .max-box { background: rgba(0, 196, 180, 0.1); color: var(--success); border: 1px solid rgba(0, 196, 180, 0.3); }
        .min-box { background: rgba(245, 166, 35, 0.1); color: var(--warning); border: 1px solid rgba(245, 166, 35, 0.3); }

        .status-bar {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: #6b8aa8;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }

        .live-dot {
            display: inline-block;
            width: 8px; height: 8px;
            background: #6b8aa8;
            border-radius: 50%;
        }
        
        .dot-active { background: var(--success); animation: pulse 2s infinite; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .btn-icon {
            background: rgba(255,255,255,0.08);
            color: #fff;
            border: 1px solid var(--border);
            padding: 8px 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-icon:hover { background: rgba(255,255,255,0.15); }

        /* Modales */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(5, 16, 28, 0.95);
            z-index: 10000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: #0a1625;
            width: 90%;
            max-width: 520px;
            border-radius: 24px;
            border: 1px solid var(--border);
        }

        .logs-container {
            height: 350px;
            overflow-y: auto;
            padding: 20px;
            background: #05101c;
            font-family: monospace;
            font-size: 0.8rem;
        }

        .log-line { margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px solid #111b2b; }
        .log-success { color: var(--success); }
        .log-error { color: #ff6b6b; }
        .log-info { color: #7eb8ff; }

        .modal-footer { padding: 15px; display: flex; gap: 10px; }
        .modal-footer button { flex: 1; padding: 10px; border-radius: 10px; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Oil Tracker Pro</h1>
            <div class="header-actions">
                <button onclick="toggleModal('historyModal')" class="btn-icon" title="Ver Historial">💾</button>
                <button onclick="toggleModal('consoleModal')" class="btn-icon">📋</button>
            </div>
        </div>

        <div class="card">
            <span class="label">● BRENT CRUDE</span>
            <div id="brent_price" class="price-main">--.--</div>
            <div class="stat-row">
                <div class="stat-box max-box">MAX: <span id="brent_max">111.80</span></div>
                <div class="stat-box min-box">MIN: <span id="brent_min">91.70</span></div>
            </div>
        </div>

        <div class="card">
            <span class="label">● WTI CRUDE</span>
            <div id="wti_price" class="price-main">--.--</div>
            <div class="stat-row">
                <div class="stat-box max-box">MAX: <span id="wti_max">117.57</span></div>
                <div class="stat-box min-box">MIN: <span id="wti_min">96.50</span></div>
            </div>
        </div>

        <div class="status-bar">
            <span id="modeText"><span id="statusDot" class="live-dot"></span> <span id="scheduleInfo">MODO: ESPERA</span></span>
            <span id="timestamp">--:--:--</span>
        </div>
    </div>

    <div id="consoleModal" class="modal">
        <div class="modal-content">
            <div style="padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between;">
                <h2>Consola de Sistema</h2>
                <button onclick="toggleModal('consoleModal')" style="background:none; color:white; border:none; cursor:pointer;">✕</button>
            </div>
            <div id="logsContainer" class="logs-container"></div>
            <div class="modal-footer">
                <button onclick="clearLogs()" style="background:#1e2a40; color:white;">🗑️ Limpiar</button>
            </div>
        </div>
    </div>

    <div id="historyModal" class="modal">
        <div class="modal-content">
            <div style="padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between;">
                <h2>💾 Historial de Precios</h2>
                <button onclick="toggleModal('historyModal')" style="background:none; color:white; border:none; cursor:pointer;">✕</button>
            </div>
            <div id="historyContainer" class="logs-container"></div>
            <div class="modal-footer">
                <button onclick="clearHistory()" style="background:#ff6b6b; color:white;">Borrar Todo</button>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "d0fe91b38b11caf283f0fe96e05992e7f3807eae0455325cd76e1f988477b685";
        
        // Cargar datos iniciales de localStorage
        let priceHistory = JSON.parse(localStorage.getItem('oil_history')) || [];
        let lastFetchDate = localStorage.getItem('last_fetch_date') || "";

        function addLog(msg, type = 'info') {
            const time = new Date().toLocaleTimeString();
            const container = document.getElementById('logsContainer');
            const div = document.createElement('div');
            div.className = 'log-line';
            div.innerHTML = `<span style="color:#5e7a9e">[${time}]</span> <span class="log-${type}">${msg}</span>`;
            container.prepend(div);
        }

        function toggleModal(id) {
            const m = document.getElementById(id);
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
            if(id === 'historyModal') renderHistory();
        }

        function renderHistory() {
            const container = document.getElementById('historyContainer');
            if (priceHistory.length === 0) {
                container.innerHTML = "<p style='text-align:center; padding:20px; color:#6b8aa8;'>No hay registros guardados.</p>";
                return;
            }
            container.innerHTML = priceHistory.map(h => `
                <div class="log-line">
                    <div style="color:var(--accent); font-weight:bold; margin-bottom:4px;">${h.date}</div>
                    <div style="display:flex; justify-content:space-between;">
                        <span>Brent: $${h.brent}</span>
                        <span>WTI: $${h.wti}</span>
                    </div>
                </div>
            `).join('');
        }

        function clearHistory() {
            if(confirm("¿Borrar todo el historial?")) {
                priceHistory = [];
                localStorage.removeItem('oil_history');
                renderHistory();
            }
        }

        function clearLogs() { document.getElementById('logsContainer').innerHTML = ""; }

        async function fetchPrice(code) {
            try {
                const res = await fetch(`https://api.oilpriceapi.com/v1/prices/latest?by_code=${code}`, {
                    headers: { 'Authorization': `Token ${API_KEY}` }
                });
                const data = await res.json();
                return parseFloat(data.data.price);
            } catch (e) {
                addLog(`Error en ${code}: ${e.message}`, "error");
                return null;
            }
        }

        async function updatePrices() {
            const now = new Date();
            const dateStr = now.toLocaleDateString();
            
            addLog("Solicitando datos nuevos a la API...", "info");
            document.getElementById('statusDot').classList.add('dot-active');

            const b = await fetchPrice("BRENT_CRUDE_USD");
            const w = await fetchPrice("WTI_USD");

            if (b && w) {
                // Actualizar UI
                document.getElementById('brent_price').textContent = b.toFixed(2);
                document.getElementById('wti_price').textContent = w.toFixed(2);
                
                // Guardar en historial
                const record = { date: now.toLocaleString(), brent: b.toFixed(2), wti: w.toFixed(2) };
                priceHistory.unshift(record);
                if(priceHistory.length > 30) priceHistory.pop(); // Mantener últimos 30
                
                localStorage.setItem('oil_history', JSON.stringify(priceHistory));
                localStorage.setItem('last_fetch_date', dateStr);
                localStorage.setItem('last_brent', b.toFixed(2));
                localStorage.setItem('last_wti', w.toFixed(2));

                addLog("Datos guardados correctamente.", "success");
            }
            
            setTimeout(() => {
                document.getElementById('statusDot').classList.remove('dot-active');
            }, 3000);
        }

        function checkSchedule() {
            const now = new Date();
            const hours = now.getHours();
            const mins = now.getMinutes();
            const dateStr = now.toLocaleDateString();

            document.getElementById('timestamp').textContent = now.toLocaleTimeString();

            // Lógica: Si son las 7:00 AM (o más) y no se ha actualizado hoy
            if (hours >= 7 && lastFetchDate !== dateStr) {
                updatePrices();
                lastFetchDate = dateStr; 
            } else {
                document.getElementById('scheduleInfo').textContent = (lastFetchDate === dateStr) 
                    ? "ACTUALIZADO HOY" 
                    : "PRÓX. SYNC: 07:00 AM";
            }
        }

        // Cargar últimos datos conocidos al abrir
        function init() {
            const lb = localStorage.getItem('last_brent');
            const lw = localStorage.getItem('last_wti');
            if(lb) document.getElementById('brent_price').textContent = lb;
            if(lw) document.getElementById('wti_price').textContent = lw;
            
            addLog("Sistema iniciado. Esperando ventana de las 07:00 AM.");
            checkSchedule();
            setInterval(checkSchedule, 1000);
        }

        init();
    </script>
</body>
</html>
