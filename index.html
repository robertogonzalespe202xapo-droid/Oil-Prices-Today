<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oil Tracker Ultra | Finnhub Real-Time</title>
    <style>
        :root { --neon-green: #39FF14; --neon-red: #ff3131; --bg-dark: #000c18; }
        body { background: var(--bg-dark); color: #fff; font-family: 'Inter', -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        
        .container { background: #050505; padding: 30px; border-radius: 24px; border: 1px solid #1a1a1a; text-align: center; width: 340px; box-shadow: 0 20px 60px rgba(0,0,0,0.8); }
        
        h1 { font-size: 0.7rem; color: #666; margin: 0 0 25px; letter-spacing: 4px; text-transform: uppercase; }
        
        .card { margin-bottom: 20px; padding: 15px; background: #0a0a0a; border-radius: 12px; border: 1px solid #111; }
        .label { font-size: 0.75rem; color: #5bc0de; font-weight: 600; }
        
        .price { font-family: 'Courier New', monospace; font-size: 3.5rem; font-weight: bold; margin: 5px 0; transition: color 0.2s ease; }
        .price.up { color: var(--neon-green); }
        .price.down { color: var(--neon-red); }

        .status-bar { font-size: 0.6rem; color: #444; margin-top: 20px; display: flex; justify-content: space-between; align-items: center; }
        .live-dot { height: 6px; width: 6px; background: #444; border-radius: 50%; display: inline-block; margin-right: 6px; transition: background 0.3s; }
        .connected .live-dot { background: var(--neon-green); box-shadow: 0 0 8px var(--neon-green); animation: pulse 1s infinite; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="container" id="mainContainer">
        <h1>DATA STREAM JUN-26</h1>
        
        <div class="card">
            <span class="label">BRENT CRUDE</span>
            <div id="BINANCE:BRENT" class="price">0.00</div>
        </div>

        <div class="card">
            <span class="label">WTI CRUDE (LIGHT)</span>
            <div id="ICEM:WTI" class="price">0.00</div>
        </div>

        <div class="status-bar">
            <span><span class="live-dot"></span> <span id="status">DISCONNECTED</span></span>
            <span id="timestamp">--:--:--</span>
        </div>
    </div>

    <script>
        const apiKey = 'd775n0hr01qtg3nfne1gd775n0hr01qtg3nfne20';
        const socket = new WebSocket(`wss://ws.finnhub.io?token=${apiKey}`);
        let lastPrices = {};

        // Símbolos de Finnhub para petróleo
        const symbols = ['BINANCE:BRENT', 'ICEM:WTI'];

        socket.addEventListener('open', function (event) {
            document.getElementById('mainContainer').classList.add('connected');
            document.getElementById('status').innerText = 'LIVE STREAM';
            
            // Suscribirse a los símbolos
            symbols.forEach(s => {
                socket.send(JSON.stringify({'type':'subscribe', 'symbol': s}));
            });
        });

        socket.addEventListener('message', function (event) {
            const data = JSON.parse(event.data);
            
            if (data.type === 'trade') {
                data.data.forEach(trade => {
                    updateDisplay(trade.s, trade.p);
                });
            }
        });

        function updateDisplay(symbol, price) {
            const el = document.getElementById(symbol);
            if (!el) return;

            const oldPrice = lastPrices[symbol] || 0;
            
            // Efecto visual de cambio
            if (price > oldPrice) {
                el.className = 'price up';
            } else if (price < oldPrice) {
                el.className = 'price down';
            }

            el.innerText = price.toFixed(2);
            lastPrices[symbol] = price;
            document.getElementById('timestamp').innerText = new Date().toLocaleTimeString();
        }

        socket.addEventListener('error', (err) => {
            document.getElementById('status').innerText = 'ERROR EN API';
            console.error(err);
        });

        socket.addEventListener('close', () => {
            document.getElementById('status').innerText = 'CLOSED';
            document.getElementById('mainContainer').classList.remove('connected');
        });
    </script>
</body>
</html>
