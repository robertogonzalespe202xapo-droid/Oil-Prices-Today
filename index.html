<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oil Tracker Pro • IMPERIVM</title>
    <style>
        :root {
            --neon-blue: #00f0ff;
            --neon-green: #00ff9d;
            --roman-purple: #4b0082; 
            --roman-red: #b22222;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #02050a;
            color: #fff;
            font-family: 'Times New Roman', serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-y: auto;
            padding: 40px 0;
        }

        /* --- PILARES ROMANOS (IMÁGENES REALES) --- */
        .pilar-img {
            position: fixed;
            top: 0;
            height: 100vh;
            width: auto;
            z-index: 100;
            pointer-events: none; /* Permite hacer clic a través de ellos */
            filter: drop-shadow(0 0 15px var(--roman-purple));
        }

        .left { left: 0; }
        .right { 
            right: 0; 
            transform: scaleX(-1); /* Refleja la imagen para el lado derecho */
        }

        .container {
            width: 90%;
            max-width: 500px;
            z-index: 10;
        }

        h1 {
            text-align: center;
            letter-spacing: 10px;
            color: gold;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
            margin-bottom: 40px;
            font-size: 1.8rem;
        }

        /* --- RECUADROS CON TU PATRÓN ROMANO ESPECÍFICO --- */
        .card-wrapper {
            position: relative;
            margin-bottom: 50px;
            background: #000;
            
            /* Aplicando tus valores exactos */
            border-style: solid;
            border-image-source: url("image_dc039d.png");
            border-image-slice: 27;
            border-image-width: 20px;
            border-image-outset: 0px;
            border-image-repeat: stretch;
        }

        /* Luz neón que brilla DESDE ABAJO del patrón romano */
        .card-wrapper::after {
            content: "";
            position: absolute;
            top: -10px; left: -10px; right: -10px; bottom: -10px;
            background: linear-gradient(45deg, var(--roman-purple), var(--neon-blue), var(--roman-red));
            z-index: -1;
            filter: blur(20px);
            opacity: 0.6;
        }

        .card {
            background: #0c111b;
            padding: 35px;
            text-align: center;
        }

        .price-label {
            font-size: 0.8rem;
            color: gold;
            letter-spacing: 3px;
            margin-bottom: 10px;
            display: block;
        }

        .price-main {
            font-family: 'Courier New', monospace;
            font-size: 3.8rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 15px var(--neon-blue);
        }

        /* --- CONSOLA DE REGISTROS --- */
        .log-trigger {
            background: var(--roman-purple);
            color: gold;
            border: 2px solid var(--roman-red);
            padding: 15px 30px;
            cursor: pointer;
            font-weight: bold;
            display: block;
            margin: 0 auto;
            transition: 0.3s;
        }

        #console-modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            max-width: 600px;
            height: 400px;
            background: rgba(0,0,0,0.95);
            border: 4px solid var(--roman-purple);
            z-index: 1000;
            padding: 20px;
            overflow-y: auto;
        }

        #log-content {
            color: var(--neon-green);
            font-family: monospace;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <img src="image_dc1a43.jpg" class="pilar-img left">
    <img src="image_dc1a43.jpg" class="pilar-img right">

    <div class="container">
        <h1>OIL IMPERIVM</h1>
        
        <div class="card-wrapper">
            <div class="card">
                <span class="price-label">BRENT CRUDE</span>
                <div id="brent" class="price-main">--.--</div>
            </div>
        </div>

        <div class="card-wrapper">
            <div class="card">
                <span class="price-label">WTI CRUDE</span>
                <div id="wti" class="price-main">--.--</div>
            </div>
        </div>

        <button class="log-trigger" onclick="document.getElementById('console-modal').style.display='block'">ABRIR REGISTROS</button>
    </div>

    <div id="console-modal" onclick="this.style.display='none'">
        <div style="color:gold; border-bottom: 1px solid var(--roman-red); padding-bottom: 10px; margin-bottom: 10px;">HISTORIAL DE PRECIOS (LIVE)</div>
        <div id="log-content"></div>
    </div>

    <script>
        const TOKEN = "d0fe91b38b11caf283f0fe96e05992e7f3807eae0455325cd76e1f988477b685";
        const ws = new WebSocket(`wss://api.oilpriceapi.com/cable?token=${TOKEN}`);

        function addLog(msg) {
            const div = document.createElement('div');
            div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            document.getElementById('log-content').appendChild(div);
        }

        ws.onopen = () => {
            addLog("Conexión con el Imperio establecida.");
            ws.send(JSON.stringify({
                command: 'subscribe',
                identifier: JSON.stringify({ channel: 'EnergyPricesChannel' })
            }));
        };

        ws.onmessage = (e) => {
            const data = JSON.parse(e.data);
            if (data.type === 'ping') return;
            if (data.message && data.message.prices) {
                addLog("Actualización recibida.");
                const p = data.message.prices;
                if(p.oil.brent) document.getElementById('brent').textContent = p.oil.brent.original_price.toFixed(2);
                if(p.oil.wti) document.getElementById('wti').textContent = p.oil.wti.original_price.toFixed(2);
            }
        };
    </script>
</body>
</html>
