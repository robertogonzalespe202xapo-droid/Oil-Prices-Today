<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oil Tracker Pro • 2026</title>
    
    <style>
        :root {
            --neon-blue: #00f0ff;
            --neon-green: #00ff9d;
            --neon-red: #ff2d55;
            --card-bg: #0c111b;
            --rgb-speed: 4s;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #050a14;
            color: #fff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* EFECTO AGUA BRILLANTE */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 240, 255, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 255, 157, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, #050a14 0%, #02050a 100%);
            z-index: -1;
            animation: waterFlow 10s ease-in-out infinite alternate;
        }

        @keyframes waterFlow {
            0% { filter: hue-rotate(0deg) brightness(1); }
            100% { filter: hue-rotate(20deg) brightness(1.3); }
        }

        .container {
            width: 100%;
            max-width: 440px;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* TARJETA CON BORDE RGB */
        .card-wrapper {
            position: relative;
            padding: 2px; /* Espacio para el borde */
            border-radius: 26px;
            margin-bottom: 25px;
            background: linear-gradient(var(--rgb-speed) linear infinite, #00f0ff, #00ff9d, #00f0ff);
            overflow: hidden;
        }

        .card-wrapper::before {
            content: "";
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(
                transparent, var(--neon-blue), var(--neon-green), transparent 30%
            );
            animation: rotateRGB var(--rgb-speed) linear infinite;
        }

        @keyframes rotateRGB {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 25px;
            position: relative;
            z-index: 2;
            backdrop-filter: blur(10px);
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header h1 {
            font-size: 1rem;
            letter-spacing: 4px;
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
            text-transform: uppercase;
        }

        .label {
            font-size: 0.7rem;
            color: #7eb8ff;
            letter-spacing: 2px;
            font-weight: bold;
        }

        .price-main {
            font-family: 'Courier New', monospace;
            font-size: 4rem;
            font-weight: 700;
            margin: 10px 0;
            transition: 0.5s;
        }

        .change {
            font-size: 0.9rem;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .positive { color: var(--neon-green); }
        .negative { color: var(--neon-red); }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.65rem;
            color: #456;
            margin-top: 10px;
        }

        .btn-action {
            background: rgba(0, 240, 255, 0.1);
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.7rem;
            transition: 0.3s;
        }

        .btn-action:hover { background: var(--neon-blue); color: #000; }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        .modal-content {
            background: #0c111b;
            width: 90%;
            max-width: 400px;
            padding: 20px;
            border-radius: 20px;
            border: 1px solid #1f2a3f;
        }

        .console {
            background: #000;
            font-family: monospace;
            padding: 10px;
            height: 200px;
            overflow-y: auto;
            font-size: 0.7rem;
            color: #0f0;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Oil Tracker Pro • 2026</h1>
            <p style="font-size: 0.6rem; opacity: 0.5;">ACTUALIZACIÓN DIARIA: 07:00 AM</p>
        </div>

        <div class="card-wrapper">
            <div class="card">
                <div class="label">BRENT CRUDE (USD)</div>
                <div id="brent_price" class="price-main">--.--</div>
                <div id="brent_change" class="change">SIN DATOS</div>
            </div>
        </div>

        <div class="card-wrapper">
            <div class="card">
                <div class="label">WTI CRUDE (USD)</div>
                <div id="wti_price" class="price-main">--.--</div>
                <div id="wti_change" class="change">SIN DATOS</div>
            </div>
        </div>

        <div class="status-bar">
            <div id="next-update">Próxima carga: --:--</div>
            <button class="btn-action" onclick="fetchPrices()">Actualizar Ahora</button>
            <button class="btn-action" onclick="toggleModal()">Logs</button>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h3 style="margin-bottom:10px">System Logs</h3>
            <div id="console" class="console"></div>
            <button class="btn-action" style="width:100%; margin-top:10px" onclick="toggleModal()">Cerrar</button>
        </div>
    </div>

    <script>
        const API_KEY = "7e5869c8f17e379b2fb01044d84f08735d5dd32bd8cacd175357d4510e6cc000";
        const BASE_URL = "https://www.oilpriceapi.com/api/v1/prices/latest";

        let lastBrent = null;
        let lastWTI = null;

        function log(msg) {
            const consoleEl = document.getElementById('console');
            const time = new Date().toLocaleTimeString();
            consoleEl.innerHTML += `<div>[${time}] ${msg}</div>`;
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        async function fetchPrices() {
            log("Iniciando request a OilPriceAPI...");
            try {
                // Brent
                const resBrent = await fetch(`${BASE_URL}?by_code=BRENT_CRUDE`, {
                    headers: { 'Authorization': `Token ${API_KEY}`, 'Content-Type': 'application/json' }
                });
                const dataBrent = await resBrent.json();

                // WTI
                const resWTI = await fetch(`${BASE_URL}?by_code=WTI_CRUDE`, {
                    headers: { 'Authorization': `Token ${API_KEY}`, 'Content-Type': 'application/json' }
                });
                const dataWTI = await resWTI.json();

                if(dataBrent.data && dataWTI.data) {
                    updateUI('brent', dataBrent.data.price, lastBrent);
                    updateUI('wti', dataWTI.data.price, lastWTI);
                    lastBrent = dataBrent.data.price;
                    lastWTI = dataWTI.data.price;
                    log("Precios actualizados con éxito.");
                }
            } catch (error) {
                log("Error de conexión: " + error.message);
            }
            scheduleNextUpdate();
        }

        function updateUI(type, price, previous) {
            const priceEl = document.getElementById(`${type}_price`);
            const changeEl = document.getElementById(`${type}_change`);
            
            priceEl.innerText = price.toFixed(2);
            
            if (previous) {
                const diff = price - previous;
                const pct = ((diff / previous) * 100).toFixed(2);
                const isPos = diff >= 0;
                changeEl.className = `change ${isPos ? 'positive' : 'negative'}`;
                changeEl.innerText = `${isPos ? '▲' : '▼'} ${Math.abs(diff).toFixed(2)} (${pct}%)`;
            } else {
                changeEl.innerText = "ESPERANDO TENDENCIA";
            }
        }

        function scheduleNextUpdate() {
            const now = new Date();
            let next = new Date();
            
            next.setHours(7, 0, 0, 0); // Programar para las 7:00 AM

            // Si ya pasaron las 7 AM hoy, programar para mañana
            if (now >= next) {
                next.setDate(next.getDate() + 1);
            }

            const diff = next - now;
            document.getElementById('next-update').innerText = `Sig. carga: ${next.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;
            
            log(`Próximo auto-refresh en ${Math.round(diff/1000/60)} minutos.`);
            
            setTimeout(fetchPrices, diff);
        }

        function toggleModal() {
            const m = document.getElementById('modal');
            m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
        }

        // Inicio
        window.onload = () => {
            fetchPrices();
        };
    </script>
</body>
</html>
