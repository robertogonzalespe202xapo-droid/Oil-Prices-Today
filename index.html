<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Oil Monitor PRO</title>
    <style>
        @font-face {
            font-family: 'Digital';
            src: url('https://db.onlinewebfonts.com/t/8e22783d707ad140b4cc30c9a5896346.woff2') format('woff2');
        }

        :root {
            --bg-navy: #001220; 
            --neon-green: #39FF14;
            --lcd-bg: #000a14;
        }

        body {
            background-color: var(--bg-navy);
            color: var(--neon-green);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .container {
            background: var(--lcd-bg);
            padding: 30px;
            border-radius: 20px;
            border: 2px solid #002a4d;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            text-align: center;
        }

        h1 {
            font-size: 1.1rem;
            color: #fff;
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .price-card {
            margin-bottom: 30px;
        }

        .label {
            font-size: 0.85rem;
            color: #5bc0de;
            margin-bottom: 12px;
            display: block;
            font-weight: bold;
        }

        .lcd-display {
            font-family: 'Digital', monospace;
            font-size: 4rem;
            background: #000;
            padding: 15px 5px;
            border-radius: 10px;
            border: 2px solid #111;
            box-shadow: inset 0 0 20px rgba(57, 255, 20, 0.15);
            line-height: 1;
        }

        .updating {
            animation: pulse 0.7s ease-out;
        }

        @keyframes pulse {
            0% { color: #fff; text-shadow: 0 0 15px #fff; }
            100% { color: var(--neon-green); }
        }

        .footer {
            margin-top: 20px;
            font-size: 0.7rem;
            color: #34495e;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .dot {
            height: 8px;
            width: 8px;
            background-color: var(--neon-green);
            border-radius: 50%;
            animation: blink 1.2s infinite;
        }

        @keyframes blink { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="container">
        <h1>REAL-TIME OIL FEED</h1>
        
        <div class="price-card">
            <span class="label">WTI CRUDE (USD)</span>
            <div id="wti" class="lcd-display">--.--</div>
        </div>

        <div class="price-card">
            <span class="label">BRENT CRUDE (USD)</span>
            <div id="brent" class="lcd-display">--.--</div>
        </div>

        <div class="footer">
            <div class="dot"></div> <span id="status">CONNECTING TO API...</span>
        </div>
    </div>

    <script>
        const API_KEY = 'D775n0hr01qtg3nfne1gd775n0hr01qtg3nfne20';

        async function fetchPrice(symbol, elementId) {
            try {
                // Símbolos de Finnhub para Crudo: US Oil (WTI) y UK Oil (Brent)
                // Nota: Usamos símbolos de futuros comunes
                const response = await fetch(`https://finnhub.io/api/v1/quote?symbol=${symbol}&token=${API_KEY}`);
                const data = await response.json();

                if (data.c && data.c !== 0) {
                    const el = document.getElementById(elementId);
                    el.innerText = data.c.toFixed(2);
                    
                    // Efecto visual de actualización
                    el.classList.remove('updating');
                    void el.offsetWidth;
                    el.classList.add('updating');
                    
                    document.getElementById('status').innerText = "LIVE DATA | 10S REFRESH";
                }
            } catch (error) {
                console.error("Error capturando datos:", error);
                document.getElementById('status').innerText = "CONNECTION ERROR";
            }
        }

        function updateAll() {
            // Símbolos estándar de Finnhub para petróleo
            fetchPrice('CL=F', 'wti');   // WTI Futures
            fetchPrice('BZ=F', 'brent'); // Brent Futures
        }

        // Primera carga y repetición cada 10 segundos
        updateAll();
        setInterval(updateAll, 10000);
    </script>
</body>
</html>
