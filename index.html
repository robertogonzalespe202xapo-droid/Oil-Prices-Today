<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oil Tracker Pro • 2026</title>
    
    <style>
        :root {
            --neon-blue: #00f0ff;
            --neon-green: #00ff9d;
            --neon-red: #ff2d55;
            --card-bg: #0c111b;
            --rgb-speed: 3s;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #050a14;
            color: #fff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* EFECTO AGUA BRILLANTE */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 30% 20%, rgba(0, 240, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 70% 80%, rgba(0, 255, 157, 0.1) 0%, transparent 50%),
                linear-gradient(180deg, #050a14 0%, #0a1428 100%);
            z-index: -1;
            animation: waterReflect 8s ease-in-out infinite alternate;
        }

        @keyframes waterReflect {
            0% { opacity: 0.8; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.1); filter: brightness(1.2); }
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            z-index: 10;
        }

        /* CONTENEDOR RGB */
        .card-wrapper {
            position: relative;
            padding: 3px;
            border-radius: 28px;
            margin-bottom: 25px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card-wrapper::before {
            content: "";
            position: absolute;
            width: 150%;
            height: 150%;
            background: conic-gradient(
                from 0deg,
                transparent 0%,
                var(--neon-blue) 25%,
                var(--neon-green) 50%,
                var(--neon-blue) 75%,
                transparent 100%
            );
            animation: rotateRGB var(--rgb-speed) linear infinite;
        }

        @keyframes rotateRGB {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .card {
            background: rgba(12, 17, 27, 0.95);
            border-radius: 25px;
            padding: 25px;
            width: 100%;
            z-index: 2;
            backdrop-filter: blur(15px);
            text-align: center;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 1.1rem;
            letter-spacing: 5px;
            color: var(--neon-blue);
            text-shadow: 0 0 15px var(--neon-blue);
            text-transform: uppercase;
        }

        .label {
            font-size: 0.75rem;
            color: #7eb8ff;
            letter-spacing: 2px;
            font-weight: 800;
            margin-bottom: 10px;
            display: block;
        }

        .price-main {
            font-family: 'Courier New', monospace;
            font-size: 4.2rem;
            font-weight: 900;
            color: #fff;
            line-height: 1;
        }

        .change {
            font-size: 1rem;
            font-weight: bold;
            margin-top: 10px;
            font-family: 'Courier New', monospace;
        }

        .positive { color: var(--neon-green); }
        .negative { color: var(--neon-red); }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
        }

        .btn {
            background: rgba(0, 240, 255, 0.05);
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 8px 15px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 20px var(--neon-blue);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 10, 20, 0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        .modal-content {
            background: #0c111b;
            width: 85%;
            max-width: 400px;
            padding: 25px;
            border-radius: 20px;
            border: 1px solid var(--neon-blue);
        }

        .console {
            background: #000;
            font-family: 'Courier New', monospace;
            padding: 15px;
            height: 250px;
            overflow-y: auto;
            font-size: 0.75rem;
            color: var(--neon-green);
            border-radius: 10px;
            margin: 15px 0;
            border: 1px solid #1f2a3f;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Oil Tracker Pro</h1>
            <div id="update-timer" style="font-size: 0.65rem; color: #456; margin-top: 5px;">Sincronizando...</div>
        </div>

        <div class="card-wrapper">
            <div class="card">
                <span class="label">BRENT OIL (USD)</span>
                <div id="brent_price" class="price-main">--.--</div>
                <div id="brent_change" class="change">--</div>
            </div>
        </div>

        <div class="card-wrapper">
            <div class="card">
                <span class="label">WTI OIL (USD)</span>
                <div id="wti_price" class="price-main">--.--</div>
                <div id="wti_change" class="change">--</div>
            </div>
        </div>

        <div class="status-bar">
            <button class="btn" onclick="fetchPrices()">Actualizar</button>
            <button class="btn" onclick="toggleModal()">Logs</button>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h2 style="font-size: 1rem; color: var(--neon-blue)">System Console</h2>
            <div id="console" class="console"></div>
            <button class="btn" style="width: 100%" onclick="toggleModal()">Cerrar</button>
        </div>
    </div>

    <script>
        const API_KEY = "d0fe91b38b11caf283f0fe96e05992e7f3807eae0455325cd76e1f988477b685";
        const BASE_URL = "https://api.oilpriceapi.com/v1/prices/latest"; // URL Corregida

        let cache = { brent: null, wti: null };

        function log(msg) {
            const c = document.getElementById('console');
            const now = new Date().toLocaleTimeString();
            c.innerHTML += `<div>[${now}] ${msg}</div>`;
            c.scrollTop = c.scrollHeight;
        }

        async function fetchPrices() {
            log("Intentando conectar con OilPriceAPI...");
            
            const options = {
                method: 'GET',
                headers: {
                    'Authorization': `Token ${API_KEY}`,
                    'Content-Type': 'application/json'
                }
            };

            try {
                // Brent
                const resB = await fetch(`${BASE_URL}?by_code=BRENT_CRUDE`, options);
                if (!resB.ok) throw new Error(`HTTP ${resB.status}`);
                const dataB = await resB.json();

                // WTI
                const resW = await fetch(`${BASE_URL}?by_code=WTI_CRUDE`, options);
                if (!resW.ok) throw new Error(`HTTP ${resW.status}`);
                const dataW = await resW.json();

                processUpdate('brent', dataB.data.price);
                processUpdate('wti', dataW.data.price);
                log("Actualización exitosa.");
                
            } catch (e) {
                log("Error Crítico: " + e.message);
                log("Sugerencia: Revisa si tu API Key tiene créditos o si hay bloqueo de CORS.");
            }
            scheduleNextUpdate();
        }

        function processUpdate(type, newPrice) {
            const priceEl = document.getElementById(`${type}_price`);
            const changeEl = document.getElementById(`${type}_change`);
            const prevPrice = cache[type];

            priceEl.innerText = newPrice.toFixed(2);

            if (prevPrice) {
                const diff = newPrice - prevPrice;
                const pct = ((diff / prevPrice) * 100).toFixed(2);
                const isPos = diff >= 0;
                changeEl.className = `change ${isPos ? 'positive' : 'negative'}`;
                changeEl.innerText = `${isPos ? '▲' : '▼'} ${Math.abs(diff).toFixed(2)} (${pct}%)`;
            } else {
                changeEl.innerText = "MARKET LIVE";
            }
            cache[type] = newPrice;
        }

        function scheduleNextUpdate() {
            const now = new Date();
            let nextUpdate = new Date();
            nextUpdate.setHours(7, 0, 0, 0);
            if (now >= nextUpdate) nextUpdate.setDate(nextUpdate.getDate() + 1);

            const msUntilUpdate = nextUpdate - now;
            const hours = Math.floor(msUntilUpdate / (1000 * 60 * 60));
            const mins = Math.floor((msUntilUpdate / (1000 * 60)) % 60);

            document.getElementById('update-timer').innerText = `Sig. carga: 07:00 AM (en ${hours}h ${mins}m)`;
            setTimeout(fetchPrices, msUntilUpdate);
        }

        function toggleModal() {
            const m = document.getElementById('modal');
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }

        window.onload = fetchPrices;
    </script>
</body>
</html>
