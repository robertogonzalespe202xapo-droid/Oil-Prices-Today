<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oil Tracker Pro • 2026</title>
    
    <style>
        :root {
            --neon-green: #00ff9d;
            --neon-red: #ff2d55;
            --neon-blue: #00f0ff;
            --card-bg: #12171f;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: radial-gradient(circle at center, #1a2333 0%, #0a0e17 100%);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .container {
            background: #0c111b;
            padding: 30px;
            border-radius: 32px;
            border: 1px solid #1f2a3f;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .header h1 {
            text-align: center;
            font-size: 0.8rem;
            color: var(--neon-blue);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 25px 15px;
            margin-bottom: 25px;
            border: 1px solid #1f2a3f;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.3s ease;
        }

        .label {
            font-size: 0.75rem;
            color: #7eb8ff;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        .price-main {
            font-family: 'DS-Digital', monospace;
            font-size: 5rem;
            font-weight: bold;
            color: #ffffff;
            line-height: 0.9;
            margin: 10px 0;
        }

        .stat-box {
            font-family: 'Courier New', monospace;
            font-size: 0.7rem;
            padding: 5px 15px;
            border-radius: 4px;
            font-weight: bold;
            width: 160px;
            text-align: center;
            letter-spacing: 1px;
        }

        .max-box {
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            background: rgba(0, 255, 157, 0.05);
            text-transform: uppercase;
        }

        .min-box {
            border: 1px solid var(--neon-red);
            color: var(--neon-red);
            background: rgba(255, 45, 85, 0.05);
            text-transform: uppercase;
        }

        .status-bar {
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
            font-size: 0.65rem;
            color: #456;
            text-transform: uppercase;
        }

        .live-dot {
            display: inline-block;
            width: 7px; height: 7px;
            background: var(--neon-green);
            border-radius: 50%;
            margin-right: 5px;
            box-shadow: 0 0 8px var(--neon-green);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>
    <div class="container" id="mainContainer">
        <div class="header"><h1>Precios Petróleo Six Seven no se jeje • 2026</h1></div>
        
        <div class="card">
            <span class="label">BRENT CRUDE</span>
            <div class="stat-box max-box">MAX MES: <span id="brent_max">0.00</span></div>
            <div id="brent_price" class="price-main">00.00</div>
            <div class="stat-box min-box">MIN MES: <span id="brent_min">0.00</span></div>
        </div>

        <div class="card">
            <span class="label">WTI CRUDE</span>
            <div class="stat-box max-box">MAX MES: <span id="wti_max">0.00</span></div>
            <div id="wti_price" class="price-main">00.00</div>
            <div class="stat-box min-box">MIN MES: <span id="wti_min">0.00</span></div>
        </div>

        <div class="status-bar">
            <span><span class="live-dot"></span>LIVE FEED</span>
            <span id="timestamp">--:--:--</span>
        </div>
    </div>

    <script>
        const API_KEY = "7e5869c8f17e379b2fb01044d84f08735d5dd32bd8cacd175357d4510e6cc000";
        const headers = { 'Authorization': `Token ${API_KEY}` };

        async function fetchMonthStats(code) {
            const now = new Date();
            const firstDay = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];
            // Obtenemos estadísticas del mes actual
            const url = `https://api.oilpriceapi.com/v1/prices/stats?by_code=${code}&from=${firstDay}`;
            
            try {
                const res = await fetch(url, { headers });
                const json = await res.json();
                return {
                    max: json.data.max_price || 0,
                    min: json.data.min_price || 0
                };
            } catch (e) { return { max: 0, min: 0 }; }
        }

        async function fetchCurrentPrice(code) {
            const res = await fetch(`https://api.oilpriceapi.com/v1/prices/latest?by_code=${code}`, { headers });
            const json = await res.json();
            return parseFloat(json.data.price);
        }

        async function updateAll() {
            try {
                // Actualizar Brent
                const bPrice = await fetchCurrentPrice("BRENT_CRUDE_USD");
                const bStats = await fetchMonthStats("BRENT_CRUDE_USD");
                document.getElementById('brent_price').textContent = bPrice.toFixed(2);
                document.getElementById('brent_max').textContent = bStats.max.toFixed(2);
                document.getElementById('brent_min').textContent = bStats.min.toFixed(2);

                // Actualizar WTI
                const wPrice = await fetchCurrentPrice("WTI_USD");
                const wStats = await fetchMonthStats("WTI_USD");
                document.getElementById('wti_price').textContent = wPrice.toFixed(2);
                document.getElementById('wti_max').textContent = wStats.max.toFixed(2);
                document.getElementById('wti_min').textContent = wStats.min.toFixed(2);

                document.getElementById('timestamp').textContent = new Date().toLocaleTimeString();
            } catch (err) {
                console.error("Error de conexión");
            }
        }

        // Ejecutar al cargar y cada 30 segundos (para no agotar la API rápidamente)
        updateAll();
        setInterval(updateAll, 30000);
    </script>
</body>
</html>
