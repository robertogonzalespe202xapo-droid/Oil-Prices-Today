<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oil Tracker Pro • JUN 2026</title>
    
    <style>
        :root {
            --neon-green: #00ff9d;
            --neon-red: #ff2d55;
            --neon-blue: #00f0ff;
            --bg: #0a0e17;
            --card-bg: #12171f;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: radial-gradient(circle at center, #1a2333 0%, #0a0e17 100%);
            color: #fff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .container {
            background: #0c111b;
            padding: 35px 25px;
            border-radius: 32px;
            border: 1px solid #1f2a3f;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 0 80px rgba(0, 0, 0, 0.5);
        }

        .header h1 {
            text-align: center;
            font-size: 0.9rem;
            color: var(--neon-blue);
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 35px;
            opacity: 0.8;
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #1f2a3f;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .label {
            font-size: 0.7rem;
            color: #567;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        /* Estilo Sándwich */
        .stat-box {
            font-family: 'Courier New', monospace;
            font-size: 0.75rem;
            padding: 4px 12px;
            border-radius: 6px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .max-box {
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            background: rgba(0, 255, 157, 0.05);
            margin-bottom: 10px;
        }

        .change-box {
            margin-top: 10px;
            font-size: 0.85rem;
        }

        .price-main {
            font-family: 'DS-Digital', monospace;
            font-size: 4.5rem;
            font-weight: bold;
            color: #ffffff; /* Precio en blanco */
            line-height: 1;
            text-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        /* Colores dinámicos para el cuadro inferior */
        .bg-up { border: 1px solid var(--neon-green); color: var(--neon-green); background: rgba(0, 255, 157, 0.1); }
        .bg-down { border: 1px solid var(--neon-red); color: var(--neon-red); background: rgba(255, 45, 85, 0.1); }

        .status-bar {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: #456;
        }

        .live-dot {
            display: inline-block;
            width: 8px; height: 8px;
            background: #333;
            border-radius: 50%;
            margin-right: 6px;
        }

        .connected .live-dot {
            background: var(--neon-green);
            box-shadow: 0 0 10px var(--neon-green);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
</head>
<body>
    <div class="container" id="mainContainer">
        <div class="header">
            <h1>Energy Market Real-Time</h1>
        </div>
        
        <div class="card">
            <span class="label">BRENT CRUDE JUN'26</span>
            <div class="stat-box max-box">MAX MES: $<span id="brent_max">--.--</span></div>
            <div id="brent_price" class="price-main">00.00</div>
            <div id="brent_change_box" class="stat-box change-box">--.--%</div>
        </div>

        <div class="card">
            <span class="label">WTI CRUDE JUN'26</span>
            <div class="stat-box max-box">MAX MES: $<span id="wti_max">--.--</span></div>
            <div id="wti_price" class="price-main">00.00</div>
            <div id="wti_change_box" class="stat-box change-box">--.--%</div>
        </div>

        <div class="status-bar">
            <span><span class="live-dot"></span><span id="status">CONECTANDO...</span></span>
            <span id="timestamp">--:--:--</span>
        </div>
    </div>

    <script>
        const API_KEY = "7e5869c8f17e379b2fb01044d84f08735d5dd32bd8cacd175357d4510e6cc000";

        const els = {
            brent: { p: document.getElementById('brent_price'), m: document.getElementById('brent_max'), c: document.getElementById('brent_change_box') },
            wti: { p: document.getElementById('wti_price'), m: document.getElementById('wti_max'), c: document.getElementById('wti_change_box') },
            status: document.getElementById('status'),
            timestamp: document.getElementById('timestamp'),
            container: document.getElementById('mainContainer')
        };

        // Simulación de máximos (puedes ajustarlos manualmente o vía API)
        let monthlyMax = { brent: 88.50, wti: 84.20 };
        let prevPrices = { brent: 0, wti: 0 };

        async function getPrice(code) {
            const res = await fetch(`https://api.oilpriceapi.com/v1/prices/latest?by_code=${code}`, {
                headers: { 'Authorization': `Token ${API_KEY}` }
            });
            const json = await res.json();
            return parseFloat(json.data.price);
        }

        async function update() {
            try {
                const [bP, wP] = await Promise.all([getPrice("BRENT_CRUDE_USD"), getPrice("WTI_USD")]);

                render(els.brent, bP, prevPrices.brent, monthlyMax.brent);
                render(els.wti, wP, prevPrices.wti, monthlyMax.wti);

                prevPrices.brent = bP;
                prevPrices.wti = wP;

                els.container.classList.add('connected');
                els.status.textContent = "LIVE";
                els.timestamp.textContent = new Date().toLocaleTimeString();
            } catch (e) {
                els.status.textContent = "OFFLINE";
            }
        }

        function render(elSet, price, prev, max) {
            elSet.p.textContent = price.toFixed(2);
            elSet.m.textContent = max.toFixed(2);
            
            // Calculamos el cambio respecto al cierre anterior (o el previo recibido)
            const diff = prev > 0 ? ((price - prev) / prev) * 100 : 0;
            const isUp = diff >= 0;

            elSet.c.textContent = `${isUp ? '▲' : '▼'} ${Math.abs(diff).toFixed(2)}%`;
            elSet.c.className = `stat-box change-box ${isUp ? 'bg-up' : 'bg-down'}`;
        }

        setInterval(update, 10000);
        update();
    </script>
</body>
</html>
