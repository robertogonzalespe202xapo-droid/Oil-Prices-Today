<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oil Tracker Pro • IMPERIVM</title>
    <style>
        :root {
            --neon-blue: #00f0ff;
            --neon-green: #00ff9d;
            --roman-purple: #4b0082; 
            --roman-red: #b22222;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #02050a;
            color: #fff;
            font-family: 'serif';
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* PILARES ROMANOS SÓLIDOS */
        .pillar {
            position: fixed;
            top: 5vh;
            width: 80px;
            height: 90vh;
            background: linear-gradient(to right, #2a0045, var(--roman-purple), #2a0045);
            border-left: 4px solid var(--roman-red);
            border-right: 4px solid var(--roman-red);
            z-index: 5;
            box-shadow: 0 0 40px rgba(178, 34, 34, 0.4);
        }

        /* Capitel y Base del Pilar */
        .pillar::before, .pillar::after {
            content: "";
            position: absolute;
            left: -10px;
            width: 100px;
            height: 30px;
            background: var(--roman-red);
            border: 2px solid gold;
        }
        .pillar::before { top: 0; } /* Capitel */
        .pillar::after { bottom: 0; } /* Base */

        .pillar.left { left: 10%; }
        .pillar.right { right: 10%; }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 40px;
            z-index: 10;
            background: rgba(0,0,0,0.6);
            border-radius: 30px;
        }

        /* EL PATRÓN ROMANO COMO BORDE */
        .card-wrapper {
            position: relative;
            padding: 15px;
            margin-bottom: 30px;
            background: #000;
            border: 10px solid transparent;
            /* Aquí inyectamos el patrón de la imagen 4 */
            border-image: url('image_4.png') 30 stretch;
            border-radius: 10px;
        }

        /* LUZ NEÓN QUE PASA POR EL PATRÓN */
        .card-wrapper::after {
            content: "";
            position: absolute;
            top: -15px; left: -15px; right: -15px; bottom: -15px;
            background: conic-gradient(from 0deg, var(--neon-blue), var(--neon-green), var(--neon-blue));
            z-index: -1;
            animation: rotate 4s linear infinite;
            filter: blur(10px);
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .card {
            background: #0c111b;
            padding: 30px;
            text-align: center;
            border-radius: 5px;
        }

        .price-main {
            font-family: 'Courier New', monospace;
            font-size: 4rem;
            font-weight: 900;
            text-shadow: 0 0 10px var(--neon-blue);
        }

        /* CONSOLA DE LOGS VISIBLE */
        .log-trigger {
            display: block;
            margin: 20px auto;
            background: var(--roman-purple);
            color: gold;
            border: 2px solid var(--roman-red);
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
        }

        #console-modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            height: 60%;
            background: #000;
            border: 5px solid var(--roman-red);
            z-index: 1000;
            padding: 20px;
            color: var(--neon-green);
            font-family: monospace;
            overflow-y: auto;
        }
    </style>
</head>
<body>

    <div class="pillar left"></div>
    <div class="pillar right"></div>

    <div class="container">
        <h1 style="text-align: center; letter-spacing: 5px; color: gold; margin-bottom: 20px;">OIL IMPERIVM</h1>
        
        <div class="card-wrapper">
            <div class="card">
                <div style="font-size: 0.8rem; color: gold;">BRENT CRUDE</div>
                <div id="brent" class="price-main">--.--</div>
            </div>
        </div>

        <div class="card-wrapper">
            <div class="card">
                <div style="font-size: 0.8rem; color: gold;">WTI CRUDE</div>
                <div id="wti" class="price-main">--.--</div>
            </div>
        </div>

        <button class="log-trigger" onclick="document.getElementById('console-modal').style.display='block'">Consultar Registros</button>
    </div>

    <div id="console-modal" onclick="this.style.display='none'">
        <div id="log-content"></div>
    </div>

    <script>
        const TOKEN = "d0fe91b38b11caf283f0fe96e05992e7f3807eae0455325cd76e1f988477b685";
        const ws = new WebSocket(`wss://api.oilpriceapi.com/cable?token=${TOKEN}`);

        function writeLog(m) {
            const line = document.createElement('div');
            line.textContent = `[${new Date().toLocaleTimeString()}] ${m}`;
            document.getElementById('log-content').appendChild(line);
        }

        ws.onopen = () => {
            writeLog("Conexión establecida con el Gran Cable.");
            ws.send(JSON.stringify({
                command: 'subscribe',
                identifier: JSON.stringify({ channel: 'EnergyPricesChannel' })
            }));
        };

        ws.onmessage = (e) => {
            const res = JSON.parse(e.data);
            if (res.type === 'ping') return;
            if (res.message && res.message.prices) {
                const p = res.message.prices;
                writeLog("Actualización de mercado recibida.");
                if(p.oil.brent) document.getElementById('brent').textContent = p.oil.brent.original_price.toFixed(2);
                if(p.oil.wti) document.getElementById('wti').textContent = p.oil.wti.original_price.toFixed(2);
            }
        };

        ws.onerror = () => writeLog("Error en el conducto de datos.");
    </script>
</body>
</html>
