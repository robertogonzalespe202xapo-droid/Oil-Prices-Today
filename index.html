<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oil Tracker Pro • IMPERIVM</title>
    <style>
        :root {
            --neon-blue: #00f0ff;
            --neon-green: #00ff9d;
            --roman-purple: #4b0082; 
            --roman-red: #b22222;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #02050a;
            color: #fff;
            font-family: 'serif';
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Permitimos scroll */
            overflow-y: auto;
            padding: 40px 0;
        }

        /* PILARES ROMANOS - Posición fija corregida */
        .pillar {
            position: fixed;
            top: 0;
            width: 60px;
            height: 100vh;
            background: linear-gradient(to right, #2a0045, var(--roman-purple), #2a0045);
            border-left: 3px solid var(--roman-red);
            border-right: 3px solid var(--roman-red);
            z-index: 100;
            box-shadow: 0 0 30px rgba(178, 34, 34, 0.3);
        }

        .pillar::before, .pillar::after {
            content: "";
            position: absolute;
            left: -10px;
            width: 80px;
            height: 20px;
            background: var(--roman-red);
            border: 1px solid gold;
        }
        .pillar::before { top: 0; }
        .pillar::after { bottom: 0; }

        .pillar.left { left: 5%; }
        .pillar.right { right: 5%; }

        .container {
            width: 90%;
            max-width: 500px;
            z-index: 10;
            padding: 20px;
        }

        h1 {
            text-align: center;
            letter-spacing: 8px;
            color: gold;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
            margin-bottom: 40px;
            font-size: 1.5rem;
        }

        /* TARJETA CON BORDE DE PATRÓN ROMANO */
        .card-wrapper {
            position: relative;
            margin-bottom: 40px;
            padding: 10px; /* Grosor del borde */
            background: #000;
            border-radius: 8px;
            /* Inyectamos el patrón directamente como borde */
            border: 8px solid transparent;
            border-image: url('image_dc039d.png') 40 round;
        }

        /* Efecto de resplandor neón suave detrás del patrón */
        .card-wrapper::after {
            content: "";
            position: absolute;
            top: -5px; left: -5px; right: -5px; bottom: -5px;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-green));
            z-index: -1;
            filter: blur(15px);
            opacity: 0.4;
        }

        .card {
            background: #0c111b;
            padding: 30px;
            text-align: center;
            border-radius: 4px;
        }

        .price-label {
            font-size: 0.8rem;
            color: gold;
            letter-spacing: 2px;
            margin-bottom: 15px;
            display: block;
        }

        .price-main {
            font-family: 'Courier New', monospace;
            font-size: 3.5rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 10px var(--neon-blue);
        }

        .log-trigger {
            background: var(--roman-purple);
            color: gold;
            border: 2px solid var(--roman-red);
            padding: 12px 25px;
            cursor: pointer;
            font-weight: bold;
            letter-spacing: 2px;
            margin: 20px auto;
            display: block;
            transition: 0.3s;
        }

        .log-trigger:hover {
            filter: brightness(1.2);
            box-shadow: 0 0 15px var(--roman-red);
        }

        /* CONSOLA DE LOGS */
        #console-modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            max-width: 600px;
            height: 50vh;
            background: rgba(0, 0, 0, 0.95);
            border: 3px solid var(--roman-red);
            z-index: 1000;
            padding: 20px;
            overflow-y: auto;
            box-shadow: 0 0 50px #000;
        }

        #log-content {
            color: var(--neon-green);
            font-family: monospace;
            font-size: 0.8rem;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="pillar left"></div>
    <div class="pillar right"></div>

    <div class="container">
        <h1>OIL IMPERIVM</h1>
        
        <div class="card-wrapper">
            <div class="card">
                <span class="price-label">BRENT CRUDE</span>
                <div id="brent" class="price-main">--.--</div>
            </div>
        </div>

        <div class="card-wrapper">
            <div class="card">
                <span class="price-label">WTI CRUDE</span>
                <div id="wti" class="price-main">--.--</div>
            </div>
        </div>

        <button class="log-trigger" onclick="openLogs()">REGISTROS DEL CABLE</button>
    </div>

    <div id="console-modal">
        <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
            <span style="color: gold;">ACTIONCABLE_MONITOR</span>
            <span style="color: var(--roman-red); cursor: pointer;" onclick="closeLogs()">[ CERRAR ]</span>
        </div>
        <div id="log-content"></div>
    </div>

    <script>
        const TOKEN = "d0fe91b38b11caf283f0fe96e05992e7f3807eae0455325cd76e1f988477b685";
        const WS_URL = `wss://api.oilpriceapi.com/cable?token=${TOKEN}`;
        let ws;

        function writeLog(m) {
            const line = document.createElement('div');
            line.textContent = `[${new Date().toLocaleTimeString()}] ${m}`;
            const content = document.getElementById('log-content');
            content.appendChild(line);
            document.getElementById('console-modal').scrollTop = content.scrollHeight;
        }

        function initWS() {
            ws = new WebSocket(WS_URL);
            
            ws.onopen = () => {
                writeLog("Conexión establecida.");
                ws.send(JSON.stringify({
                    command: 'subscribe',
                    identifier: JSON.stringify({ channel: 'EnergyPricesChannel' })
                }));
            };

            ws.onmessage = (e) => {
                const res = JSON.parse(e.data);
                if (res.type === 'ping') return;
                
                if (res.message && res.message.prices) {
                    const p = res.message.prices;
                    writeLog("Datos recibidos.");
                    if(p.oil.brent) document.getElementById('brent').textContent = p.oil.brent.original_price.toFixed(2);
                    if(p.oil.wti) document.getElementById('wti').textContent = p.oil.wti.original_price.toFixed(2);
                }
            };

            ws.onclose = () => {
                writeLog("Desconectado. Reintentando...");
                setTimeout(initWS, 5000);
            };
        }

        function openLogs() { document.getElementById('console-modal').style.display = 'block'; }
        function closeLogs() { document.getElementById('console-modal').style.display = 'none'; }

        initWS();
    </script>
</body>
</html>
