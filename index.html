<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oil Tracker Pro • 2026</title>
    
    <style>
        :root {
            --primary: #0a1625;
            --accent: #00d4c8;
            --text: #e0f0ff;
            --card-bg: #111b2b;
            --border: #1e2a40;
            --success: #00c4b4;
            --warning: #f5a623;
            --live: #ff4757;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: linear-gradient(180deg, #0a1625 0%, #05101c 100%);
            color: var(--text);
            font-family: system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .main-wrapper {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 900px;
            flex-wrap: wrap;
        }

        .container {
            background: #0a1625;
            padding: 32px 28px;
            border-radius: 28px;
            border: 1px solid var(--border);
            flex: 1;
            min-width: 320px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
            position: relative;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
        }

        .header h1 { font-size: 1.1rem; font-weight: 600; color: #fff; }
        
        .header-actions { display: flex; gap: 8px; }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid var(--border);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .label {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: #7eb8ff;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .price-main {
            font-family: 'Courier New', monospace;
            font-size: 3.5rem;
            font-weight: 500;
            color: #fff;
            margin: 12px 0 20px;
        }

        .ws-badge {
            background: var(--live);
            color: white;
            font-size: 0.6rem;
            padding: 2px 6px;
            border-radius: 4px;
            vertical-align: middle;
            margin-left: 5px;
            animation: pulse 1.5s infinite;
        }

        .stat-row { display: flex; gap: 12px; }

        .stat-box {
            font-size: 0.78rem;
            padding: 8px;
            border-radius: 12px;
            flex: 1;
            font-weight: 600;
        }

        .max-box { background: rgba(0, 196, 180, 0.1); color: var(--success); border: 1px solid rgba(0, 196, 180, 0.3); }
        .min-box { background: rgba(245, 166, 35, 0.1); color: var(--warning); border: 1px solid rgba(245, 166, 35, 0.3); }

        .status-bar {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: #6b8aa8;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }

        .live-dot {
            display: inline-block;
            width: 8px; height: 8px;
            background: #6b8aa8;
            border-radius: 50%;
        }
        
        .dot-active { background: var(--success); animation: pulse 2s infinite; }
        .dot-ws { background: var(--live); }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .btn-icon {
            background: rgba(255,255,255,0.08);
            color: #fff;
            border: 1px solid var(--border);
            padding: 8px 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-icon:hover { background: rgba(255,255,255,0.15); }

        /* Modales */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(5, 16, 28, 0.95);
            z-index: 10000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: #0a1625;
            width: 90%;
            max-width: 520px;
            border-radius: 24px;
            border: 1px solid var(--border);
        }

        .logs-container {
            height: 350px;
            overflow-y: auto;
            padding: 20px;
            background: #05101c;
            font-family: monospace;
            font-size: 0.8rem;
        }

        .log-line { margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px solid #111b2b; }
        .log-success { color: var(--success); }
        .log-error { color: #ff6b6b; }
        .log-info { color: #7eb8ff; }
        .log-ws { color: var(--live); }

        .modal-footer { padding: 15px; display: flex; gap: 10px; }
        .modal-footer button { flex: 1; padding: 10px; border-radius: 10px; border: none; cursor: pointer; }

        @media (max-width: 768px) {
            .main-wrapper { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <div class="container">
            <div class="header">
                <h1>Snapshot API</h1>
                <div class="header-actions">
                    <button onclick="toggleModal('historyModal')" class="btn-icon" title="Ver Historial">💾</button>
                    <button onclick="toggleModal('consoleModal')" class="btn-icon">📋</button>
                </div>
            </div>

            <div class="card">
                <span class="label">● BRENT (DAILY)</span>
                <div id="brent_price" class="price-main">--.--</div>
                <div class="stat-row">
                    <div class="stat-box max-box">MAX: <span id="brent_max">111.80</span></div>
                    <div class="stat-box min-box">MIN: <span id="brent_min">91.70</span></div>
                </div>
            </div>

            <div class="card">
                <span class="label">● WTI (DAILY)</span>
                <div id="wti_price" class="price-main">--.--</div>
                <div class="stat-row">
                    <div class="stat-box max-box">MAX: <span id="wti_max">117.57</span></div>
                    <div class="stat-box min-box">MIN: <span id="wti_min">96.50</span></div>
                </div>
            </div>

            <div class="status-bar">
                <span id="modeText"><span id="statusDot" class="live-dot"></span> <span id="scheduleInfo">MODO: ESPERA</span></span>
                <span id="timestamp">--:--:--</span>
            </div>
        </div>

        <div class="container" style="border-color: var(--live);">
            <div class="header">
                <h1>Live Stream <span class="ws-badge">LIVE</span></h1>
            </div>

            <div class="card" style="background: #1a121a;">
                <span class="label" style="color: var(--live);">● BRENT REAL-TIME</span>
                <div id="ws_brent_price" class="price-main" style="color: var(--live);">--.--</div>
                <div id="ws_brent_status" style="font-size: 0.7rem; color: #6b8aa8;">Esperando datos...</div>
            </div>

            <div class="card" style="background: #1a121a;">
                <span class="label" style="color: var(--live);">● WTI REAL-TIME</span>
                <div id="ws_wti_price" class="price-main" style="color: var(--live);">--.--</div>
                <div id="ws_wti_status" style="font-size: 0.7rem; color: #6b8aa8;">Esperando datos...</div>
            </div>

            <div class="status-bar">
                <span><span id="wsDot" class="live-dot dot-ws"></span> WS: <span id="wsStatus">DESCONECTADO</span></span>
                <span id="wsTime">--:--:--</span>
            </div>
        </div>
    </div>

    <div id="consoleModal" class="modal">
        <div class="modal-content">
            <div style="padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between;">
                <h2>Consola de Sistema</h2>
                <button onclick="toggleModal('consoleModal')" style="background:none; color:white; border:none; cursor:pointer;">✕</button>
            </div>
            <div id="logsContainer" class="logs-container"></div>
            <div class="modal-footer">
                <button onclick="clearLogs()" style="background:#1e2a40; color:white;">🗑️ Limpiar</button>
            </div>
        </div>
    </div>

    <div id="historyModal" class="modal">
        <div class="modal-content">
            <div style="padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between;">
                <h2>💾 Historial</h2>
                <button onclick="toggleModal('historyModal')" style="background:none; color:white; border:none; cursor:pointer;">✕</button>
            </div>
            <div id="historyContainer" class="logs-container"></div>
            <div class="modal-footer">
                <button onclick="clearHistory()" style="background:#ff6b6b; color:white;">Borrar Todo</button>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "d0fe91b38b11caf283f0fe96e05992e7f3807eae0455325cd76e1f988477b685";
        let priceHistory = JSON.parse(localStorage.getItem('oil_history')) || [];
        let lastFetchDate = localStorage.getItem('last_fetch_date') || "";

        // --- LÓGICA API SNAPSHOT ---
        function addLog(msg, type = 'info') {
            const time = new Date().toLocaleTimeString();
            const container = document.getElementById('logsContainer');
            const div = document.createElement('div');
            div.className = 'log-line';
            div.innerHTML = `<span style="color:#5e7a9e">[${time}]</span> <span class="log-${type}">${msg}</span>`;
            container.prepend(div);
        }

        async function fetchPrice(code) {
            try {
                const res = await fetch(`https://api.oilpriceapi.com/v1/prices/latest?by_code=${code}`, {
                    headers: { 'Authorization': `Token ${API_KEY}` }
                });
                const data = await res.json();
                return parseFloat(data.data.price);
            } catch (e) {
                addLog(`Error API ${code}: ${e.message}`, "error");
                return null;
            }
        }

        async function updatePrices() {
            addLog("Solicitando Snapshot API...", "info");
            document.getElementById('statusDot').classList.add('dot-active');
            const b = await fetchPrice("BRENT_CRUDE_USD");
            const w = await fetchPrice("WTI_USD");
            if (b && w) {
                document.getElementById('brent_price').textContent = b.toFixed(2);
                document.getElementById('wti_price').textContent = w.toFixed(2);
                const record = { date: new Date().toLocaleString(), brent: b.toFixed(2), wti: w.toFixed(2) };
                priceHistory.unshift(record);
                localStorage.setItem('oil_history', JSON.stringify(priceHistory.slice(0,30)));
                addLog("Snapshot API actualizado.", "success");
            }
            setTimeout(() => document.getElementById('statusDot').classList.remove('dot-active'), 2000);
        }

        // --- LÓGICA WEBSOCKET ---
        let socket;
        function initWebSocket() {
            socket = new WebSocket("wss://api.oilpriceapi.com/cable");

            socket.onopen = () => {
                document.getElementById('wsStatus').textContent = "CONECTADO";
                document.getElementById('wsStatus').style.color = "var(--success)";
                addLog("WebSocket: Conexión establecida.", "ws");

                // Suscripción al canal (Protocolo ActionCable)
                const msg = {
                    command: "subscribe",
                    identifier: JSON.stringify({
                        channel: "PriceChannel",
                        api_key: API_KEY
                    })
                };
                socket.send(JSON.stringify(msg));
            };

            socket.onmessage = (event) => {
                const response = JSON.parse(event.data);
                
                // Ignorar mensajes de ping o bienvenida
                if (response.type === "ping" || response.type === "welcome" || response.type === "confirm_subscription") return;

                if (response.message) {
                    const data = response.message;
                    const price = parseFloat(data.price).toFixed(2);
                    const code = data.code;
                    const time = new Date().toLocaleTimeString();

                    if (code === "BRENT_CRUDE_USD") {
                        animatePrice('ws_brent_price', price);
                        document.getElementById('ws_brent_status').textContent = `Actualizado: ${time}`;
                    } else if (code === "WTI_USD") {
                        animatePrice('ws_wti_price', price);
                        document.getElementById('ws_wti_status').textContent = `Actualizado: ${time}`;
                    }
                    document.getElementById('wsTime').textContent = time;
                }
            };

            socket.onclose = () => {
                document.getElementById('wsStatus').textContent = "RECONECTANDO...";
                document.getElementById('wsStatus').style.color = var(--warning);
                setTimeout(initWebSocket, 5000); // Reintento
            };
        }

        function animatePrice(id, newPrice) {
            const el = document.getElementById(id);
            el.style.transform = "scale(1.1)";
            el.textContent = newPrice;
            setTimeout(() => el.style.transform = "scale(1)", 200);
        }

        // --- UTILIDADES ---
        function toggleModal(id) {
            const m = document.getElementById(id);
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
            if(id === 'historyModal') renderHistory();
        }

        function renderHistory() {
            const container = document.getElementById('historyContainer');
            container.innerHTML = priceHistory.map(h => `
                <div class="log-line">
                    <div style="color:var(--accent); font-weight:bold;">${h.date}</div>
                    <div style="display:flex; justify-content:space-between; font-size:0.9rem;">
                        <span>Brent: $${h.brent}</span><span>WTI: $${h.wti}</span>
                    </div>
                </div>
            `).join('') || "Sin registros.";
        }

        function checkSchedule() {
            const now = new Date();
            document.getElementById('timestamp').textContent = now.toLocaleTimeString();
            if (now.getHours() >= 7 && lastFetchDate !== now.toLocaleDateString()) {
                updatePrices();
                lastFetchDate = now.toLocaleDateString();
                localStorage.setItem('last_fetch_date', lastFetchDate);
            }
        }

        // Inicio
        initWebSocket();
        setInterval(checkSchedule, 1000);
        updatePrices();
    </script>
</body>
</html>
