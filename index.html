<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oil Tracker Pro • ROMA</title>
    
    <style>
        :root {
            --neon-blue: #00f0ff;
            --neon-green: #00ff9d;
            --neon-red: #ff2d55;
            --roman-purple: #5b217a; /* Púrpura Imperial Tono */
            --roman-red: #8e1a1a;    /* Rojo Pompeyano Tono */
            --card-bg: rgba(12, 17, 27, 0.95);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #050a14;
            color: #fff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* FONDO DINÁMICO */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 30% 20%, rgba(91, 33, 122, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 70% 80%, rgba(142, 26, 26, 0.15) 0%, transparent 50%),
                #050a14;
            z-index: -1;
            filter: contrast(110%);
        }

        /* PILARES ROMANOS FLANQUEADORES */
        .pillar {
            position: fixed;
            top: -10vh;
            height: 120vh;
            width: 100px;
            background: 
                linear-gradient(90deg, #111 0%, transparent 10%, transparent 90%, #111 100%),
                linear-gradient(180deg, #1a2333 0%, var(--roman-purple) 20%, #050a14 50%, var(--roman-red) 80%, #1a2333 100%),
                repeating-linear-gradient(90deg, #1a2333 0%, #1a2333 5px, #050a14 5px, #050a14 10px);
            z-index: 1;
            border: 4px solid var(--roman-red);
            border-bottom: 20px solid var(--roman-red);
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(142, 26, 26, 0.5);
            filter: drop-shadow(0 0 10px rgba(91, 33, 122, 0.3));
        }

        .pillar.left { left: 5vw; }
        .pillar.right { right: 5vw; }

        .container {
            width: 100%;
            max-width: 440px;
            padding: 20px;
            z-index: 10;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 1.1rem;
            letter-spacing: 5px;
            color: var(--neon-blue);
            text-shadow: 0 0 15px var(--neon-blue);
            text-transform: uppercase;
        }

        /* CONTENEDOR CON PATRÓN ROMANO Y RGB */
        .card-wrapper {
            position: relative;
            margin-bottom: 25px;
            border-radius: 28px;
            overflow: hidden;
            padding: 10px; /* Espacio para el patrón romano */
        }

        .card-wrapper::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('image_4.png');
            background-size: 400px;
            opacity: 0.15;
            z-index: 1;
        }

        .card-wrapper::after {
            content: "";
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(
                from 0deg,
                transparent 0%,
                var(--neon-blue) 25%,
                var(--neon-green) 50%,
                var(--neon-blue) 75%,
                transparent 100%
            );
            animation: rotateRGB 4s linear infinite;
            z-index: 0;
            opacity: 0.8;
            filter: blur(2px);
        }

        @keyframes rotateRGB {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .card {
            background: var(--card-bg);
            border-radius: 25px;
            padding: 25px;
            width: 100%;
            z-index: 2;
            backdrop-filter: blur(15px);
            position: relative;
            text-align: center;
        }

        .label {
            font-size: 0.75rem;
            color: #7eb8ff;
            letter-spacing: 2px;
            font-weight: bold;
            display: block;
            margin-bottom: 10px;
        }

        .price-main {
            font-family: 'Courier New', monospace;
            font-size: 4.2rem;
            font-weight: 900;
            color: #fff;
            line-height: 1;
        }

        .price-update {
            animation: flashUpdate 0.5s ease-out;
        }

        @keyframes flashUpdate {
            0% { filter: brightness(3); transform: scale(1.05); }
            100% { filter: brightness(1); transform: scale(1); }
        }

        .status-bar {
            display: flex;
            justify-content: center;
            margin-top: 15px;
        }

        .btn-logs {
            background: rgba(0, 240, 255, 0.05);
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 8px 15px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-logs:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 20px var(--neon-blue);
        }

        /* MODAL LOGS MEJORADO */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 10, 20, 0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        .modal-content {
            background: #0c111b;
            width: 85%;
            max-width: 400px;
            padding: 25px;
            border-radius: 20px;
            border: 1px solid var(--roman-purple);
            border-left: 10px solid var(--roman-purple);
        }

        .console {
            background: #000;
            font-family: 'Courier New', monospace;
            padding: 15px;
            height: 250px;
            overflow-y: auto;
            font-size: 0.75rem;
            color: var(--neon-green);
            border-radius: 10px;
            margin: 15px 0;
            border: 1px solid #1f2a3f;
        }
    </style>
</head>
<body>

    <div class="pillar left"></div>
    <div class="pillar right"></div>

    <div class="container">
        <div class="header">
            <h1>Oil Tracker Pro</h1>
            <div id="socket-status" style="font-size: 0.65rem; color: #456; margin-top: 5px;">Sincronizando...</div>
        </div>

        <div class="card-wrapper">
            <div class="card">
                <span class="label">BRENT CRUDE (USD)</span>
                <div id="brent_price" class="price-main">--.--</div>
                <div style="font-size: 0.6rem; color: #456; margin-top: 5px;">LIVE CABLE</div>
            </div>
        </div>

        <div class="card-wrapper">
            <div class="card">
                <span class="label">WTI CRUDE (USD)</span>
                <div id="wti_price" class="price-main">--.--</div>
                <div style="font-size: 0.6rem; color: #456; margin-top: 5px;">LIVE CABLE</div>
            </div>
        </div>

        <div class="status-bar">
            <button class="btn-logs" onclick="toggleModal()">Ver Logs</button>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h2 style="font-size: 1rem; color: var(--roman-purple)">ActionCable Logs</h2>
            <div id="console" class="console"></div>
            <button class="btn-logs" style="width: 100%" onclick="toggleModal()">Cerrar</button>
        </div>
    </div>

    <script>
        const TOKEN = "d0fe91b38b11caf283f0fe96e05992e7f3807eae0455325cd76e1f988477b685";
        const WS_URL = `wss://api.oilpriceapi.com/cable?token=${TOKEN}`;

        function log(msg) {
            const c = document.getElementById('console');
            if (c) { // Asegurar que el elemento existe
                const now = new Date().toLocaleTimeString();
                c.innerHTML += `<div>[${now}] ${msg}</div>`;
                c.scrollTop = c.scrollHeight;
            }
        }

        function initWebSocket() {
            log("Iniciando conexión WebSocket...");
            const ws = new WebSocket(WS_URL);

            ws.onopen = () => {
                log('Conectado al Cable. Suscribiendo...');
                document.getElementById('socket-status').innerText = "CONECTADO - TRANSMITIENDO";
                document.getElementById('socket-status').style.color = "var(--neon-green)";
                
                // Formato ActionCable
                ws.send(JSON.stringify({
                    command: 'subscribe',
                    identifier: JSON.stringify({ channel: 'EnergyPricesChannel' })
                }));
            };

            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);

                if (msg.type === 'ping') return;
                
                if (msg.type === 'welcome') {
                    log('Servidor: Welcome received.');
                    return;
                }

                if (msg.type === 'confirm_subscription') {
                    log('Suscripción confirmada: Esperando precios...');
                    return;
                }

                if (msg.message && msg.message.prices) {
                    const prices = msg.message.prices;
                    
                    if (prices.oil) {
                        updateUI('brent_price', prices.oil.brent?.original_price);
                        updateUI('wti_price', prices.oil.wti?.original_price);
                    }
                }
            };

            ws.onerror = (err) => {
                log('Error de conexión WebSocket.');
                document.getElementById('socket-status').innerText = "ERROR DE CONEXIÓN";
                document.getElementById('socket-status').style.color = "var(--neon-red)";
            };

            ws.onclose = () => {
                log('Conexión cerrada. Reintentando en 5s...');
                setTimeout(initWebSocket, 5000);
            };
        }

        function updateUI(id, newPrice) {
            if (!newPrice) return;
            const priceEl = document.getElementById(id);
            const formattedPrice = parseFloat(newPrice).toFixed(2);
            
            if (priceEl.innerText !== formattedPrice) {
                priceEl.innerText = formattedPrice;
                // Pequeña animación de parpadeo
                priceEl.classList.remove('price-update');
                void priceEl.offsetWidth; // Truco para reiniciar animación
                priceEl.classList.add('price-update');
            }
        }

        function toggleModal() {
            const m = document.getElementById('modal');
            m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
        }

        // Inicio
        window.onload = initWebSocket;
    </script>
</body>
</html>
