<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oil Tracker Pro • 2026</title>
    <style>
        :root {
            --primary: #0a1625;
            --accent: #00d4c8;
            --text: #e0f0ff;
            --card-bg: #111b2b;
            --border: #1e2a40;
            --success: #00c4b4;
            --warning: #f5a623;
            --live: #ff4757;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: linear-gradient(180deg, #0a1625 0%, #05101c 100%);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center; padding: 20px;
        }

        .main-layout {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1100px;
        }

        .container {
            background: #0a1625;
            padding: 28px;
            border-radius: 28px;
            border: 1px solid var(--border);
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .header h2 { font-size: 0.95rem; color: #fff; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 15px;
            text-align: center;
            position: relative;
        }

        .price-val {
            font-family: 'Courier New', monospace;
            font-size: 3.2rem;
            display: block;
            margin: 8px 0;
            color: #fff;
            transition: all 0.2s ease;
        }

        .label { font-size: 0.75rem; font-weight: 800; color: #7eb8ff; letter-spacing: 1px; }
        
        .status-footer {
            font-size: 0.7rem;
            color: #6b8aa8;
            display: flex;
            justify-content: space-between;
            margin-top: auto;
            padding-top: 15px;
            border-top: 1px solid var(--border);
        }

        .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; background: #222; margin-right: 5px; }
        .dot-online { background: var(--success); box-shadow: 0 0 12px var(--success); }
        .dot-ws { background: var(--live); box-shadow: 0 0 12px var(--live); animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .btn-tool { 
            background: rgba(255,255,255,0.05); border: 1px solid var(--border); 
            color: white; padding: 8px 12px; border-radius: 10px; cursor: pointer;
        }

        /* Modales */
        .modal { 
            display: none; position: fixed; inset: 0; background: rgba(5, 16, 28, 0.95); 
            z-index: 9999; align-items: center; justify-content: center; 
        }
        .modal-inner { 
            background: #0a1625; width: 90%; max-width: 500px; border-radius: 24px; 
            border: 1px solid var(--border); padding: 25px; 
        }
        .log-box { 
            height: 350px; overflow-y: auto; background: #05101c; 
            font-family: monospace; font-size: 0.8rem; padding: 15px; border-radius: 15px;
        }
        .log-entry { margin-bottom: 8px; border-bottom: 1px solid #111b2b; padding-bottom: 5px; }
    </style>
</head>
<body>

    <div class="main-layout">
        <div class="container">
            <div class="header">
                <h2>Today Oil Price</h2>
                <div style="display: flex; gap: 8px;">
                    <button class="btn-tool" onclick="openModal('modalLogs')">📋</button>
                    <button class="btn-tool" onclick="openModal('modalHistory')">💾</button>
                </div>
            </div>
            
            <div class="card">
                <span class="label">● BRENT (API)</span>
                <span id="api_brent" class="price-val">--.--</span>
            </div>
            <div class="card">
                <span class="label">● WTI (API)</span>
                <span id="api_wti" class="price-val">--.--</span>
            </div>

            <div class="status-footer">
                <span><span id="api_dot" class="dot"></span> STATUS: <span id="api_status">READY</span></span>
                <span id="api_time">--:--:--</span>
            </div>
        </div>

        <div class="container" style="border-color: rgba(255, 71, 87, 0.4);">
            <div class="header">
                <h2 style="color: var(--live);">Oil Price Livestream</h2>
            </div>
            
            <div class="card" style="background: #161012; border-color: rgba(255, 71, 87, 0.2);">
                <span class="label" style="color: var(--live);">● BRENT LIVE</span>
                <span id="ws_brent" class="price-val" style="color: var(--live);">--.--</span>
            </div>
            <div class="card" style="background: #161012; border-color: rgba(255, 71, 87, 0.2);">
                <span class="label" style="color: var(--live);">● WTI LIVE</span>
                <span id="ws_wti" class="price-val" style="color: var(--live);">--.--</span>
            </div>

            <div class="status-footer">
                <span><span id="ws_dot" class="dot"></span> STREAM: <span id="ws_status">OFFLINE</span></span>
                <span id="ws_time">--:--:--</span>
            </div>
        </div>
    </div>

    <div id="modalLogs" class="modal">
        <div class="modal-inner">
            <h3 style="margin-bottom:15px;">System Console</h3>
            <div id="con_logs" class="log-box"></div>
            <button class="btn-tool" style="width:100%; margin-top:20px;" onclick="closeModal('modalLogs')">Close</button>
        </div>
    </div>

    <div id="modalHistory" class="modal">
        <div class="modal-inner">
            <h3 style="margin-bottom:15px;">Price History</h3>
            <div id="his_logs" class="log-box"></div>
            <button class="btn-tool" style="width:100%; margin-top:20px;" onclick="closeModal('modalHistory')">Close</button>
        </div>
    </div>

    <script>
        const CONFIG = {
            key: "d0fe91b38b11caf283f0fe96e05992e7f3807eae0455325cd76e1f988477b685",
            api_url: "https://api.oilpriceapi.com/v1/prices/latest",
            ws_url: "wss://api.oilpriceapi.com/cable"
        };

        let priceHistory = JSON.parse(localStorage.getItem('oil_history')) || [];

        function sysLog(msg, color = "#7eb8ff") {
            const box = document.getElementById('con_logs');
            const time = new Date().toLocaleTimeString();
            const div = document.createElement('div');
            div.className = 'log-entry';
            div.innerHTML = `<span style="color:#555">[${time}]</span> <span style="color:${color}">${msg}</span>`;
            box.prepend(div);
        }

        function saveToHistory(b, w) {
            const entry = { t: new Date().toLocaleString(), b, w };
            priceHistory.unshift(entry);
            priceHistory = priceHistory.slice(0, 50);
            localStorage.setItem('oil_history', JSON.stringify(priceHistory));
            renderHistory();
        }

        function renderHistory() {
            const box = document.getElementById('his_logs');
            box.innerHTML = priceHistory.map(h => `
                <div class="log-entry">
                    <b style="color:var(--accent)">${h.t}</b><br>
                    B: $${h.b} | W: $${h.w}
                </div>
            `).join('');
        }

        // --- LÓGICA REST API (Ejemplo corregido según tu código Python) ---
        async function fetchPricesAPI() {
            document.getElementById('api_dot').classList.add('dot-online');
            sysLog("API: Fetching latest prices...", "#00d4c8");
            
            try {
                // Hacemos fetch a la URL base que devuelve múltiples precios
                const response = await fetch(CONFIG.api_url, {
                    headers: { 'Authorization': `Token ${CONFIG.key}` }
                });
                const json = await response.json();
                
                // Si la respuesta es una lista (como en tu ejemplo de Python)
                // Buscamos específicamente Brent y WTI en el array data
                let brent = 0, wti = 0;
                
                if(json.data) {
                    // Manejo si devuelve objeto único o array
                    const items = Array.isArray(json.data) ? json.data : [json.data];
                    
                    // Nota: Si usas la URL sin parámetros, suele devolver el último precio general.
                    // Para asegurar, hacemos peticiones específicas:
                    const resB = await fetch(`${CONFIG.api_url}?by_code=BRENT_CRUDE_USD`, { headers: { 'Authorization': `Token ${CONFIG.key}` } });
                    const resW = await fetch(`${CONFIG.api_url}?by_code=WTI_USD`, { headers: { 'Authorization': `Token ${CONFIG.key}` } });
                    
                    const dataB = await resB.json();
                    const dataW = await resW.json();
                    
                    brent = dataB.data.price;
                    wti = dataW.data.price;
                }

                document.getElementById('api_brent').textContent = brent.toFixed(2);
                document.getElementById('api_wti').textContent = wti.toFixed(2);
                document.getElementById('api_time').textContent = new Date().toLocaleTimeString();
                
                saveToHistory(brent.toFixed(2), wti.toFixed(2));
                sysLog("API: Success updated", "#00c4b4");
            } catch (e) {
                sysLog("API Error: " + e.message, "#ff6b6b");
            }
            setTimeout(() => document.getElementById('api_dot').classList.remove('dot-online'), 2000);
        }

        // --- LÓGICA WEBSOCKET ---
        let socket;
        function connectWS() {
            socket = new WebSocket(CONFIG.ws_url);

            socket.onopen = () => {
                sysLog("WS: Connected. Sending Handshake...", "#ff4757");
                
                // Suscripción obligatoria para recibir datos
                const subParams = {
                    command: "subscribe",
                    identifier: JSON.stringify({ 
                        channel: "PriceChannel", 
                        api_key: CONFIG.key 
                    })
                };
                socket.send(JSON.stringify(subParams));
            };

            socket.onmessage = (e) => {
                const data = JSON.parse(e.data);
                
                if (data.type === "ping") return;
                if (data.type === "welcome") sysLog("WS: Welcome received.");
                
                if (data.type === "confirm_subscription") {
                    sysLog("WS: LIVE SUBSCRIPTION ACTIVE", "#00c4b4");
                    document.getElementById('ws_dot').classList.add('dot-ws');
                    document.getElementById('ws_status').textContent = "LIVE";
                }

                if (data.message) {
                    const price = parseFloat(data.message.price).toFixed(2);
                    const code = data.message.code;
                    
                    if (code === "BRENT_CRUDE_USD") {
                        updateWSDisplay('ws_brent', price);
                    } else if (code === "WTI_USD") {
                        updateWSDisplay('ws_wti', price);
                    }
                    document.getElementById('ws_time').textContent = new Date().toLocaleTimeString();
                    sysLog(`WS: Tick ${code}: $${price}`, "#ff4757");
                }
            };

            socket.onclose = () => {
                document.getElementById('ws_dot').classList.remove('dot-ws');
                document.getElementById('ws_status').textContent = "OFFLINE";
                sysLog("WS: Disconnected. Retrying in 5s...", "#f5a623");
                setTimeout(connectWS, 5000);
            };
        }

        function updateWSDisplay(id, val) {
            const el = document.getElementById(id);
            el.textContent = val;
            el.style.transform = "scale(1.1)";
            setTimeout(() => el.style.transform = "scale(1)", 200);
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        // Inicio
        renderHistory();
        fetchPricesAPI();
        connectWS();
        setInterval(fetchPricesAPI, 600000); // Actualiza API cada 10 min
    </script>
</body>
</html>
